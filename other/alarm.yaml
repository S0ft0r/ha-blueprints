blueprint:
  name: Управление ночником и чайником по будильнику
  description: |
    ### Управление ночником и чайником по будильнику.
    <small>Версия 2026.06.01 Сборка 1</small> 

    <small><a href="https://github.com/S0ft0r/ha-blueprints/blob/main/as-is.md">Отказ от ответственности</a></small>
  domain: automation
  source_url: https://github.com/S0ft0r/ha-blueprints/blob/main/other/dev/dev.alarm.yaml
  author: Softor

  input:
    kettle_switch:
      name: Чайник
      description: 
        Чайник/любой прибор (настроенный как нагреватель)
      selector:
        entity:
          filter:
            - domain:
                - water_heater
          multiple: false

    light_switch:
      name: Ночник
      description: ""
      selector:
        entity:
          filter:
            - domain:
                - light
          multiple: true

    person_sensor:
      name: Персона
      selector:
        entity:
          filter:
            - domain:
                - person
          multiple: false


    options_workday:
      name: Будни
      input:
        set_alarm_workday:
          name: Время включения будильника
          description: ""
          default:
          selector:
            time: {}

        set_alarm_workday_sensor:
          name: Сенсор времени включения будильника
          description: ""
          default: []
          selector:
            entity:
              filter:
                - domain: 
                    - input_datetime
              multiple: false

        set_kettle_on_workday:
          name: Включать чайник
          default: false
          selector:
            boolean:

        set_light_on_workday:
          name: Включать ночник
          default: false
          selector:
            boolean:

    options_saturday:
      name: Суббота
      input:
        set_alarm_saturday:
          name: Время включения будильника
          description: ""
          default:
          selector:
            time: {}

        set_alarm_saturday_sensor:
          name: Сенсор времени включения будильника
          description: ""
          default: []
          selector:
            entity:
              filter:
                - domain: 
                    - input_datetime
              multiple: false

        set_kettle_on_saturday:
          name: Включать чайник
          default: false
          selector:
            boolean:

        set_light_on_saturday:
          name: Включать ночник
          default: false
          selector:
            boolean: 

    options_sunday:
      name: Воскресенье
      input:
        set_alarm_sunday:
          name: Время включения будильника
          description: ""
          default:
          selector:
            time: {}

        set_alarm_sunday_sensor:
          name: Сенсор времени включения будильника
          description: ""
          default: []
          selector:
            entity:
              filter:
                - domain: 
                    - input_datetime
              multiple: false

        set_kettle_on_sunday:
          name: Включать чайник
          default: false
          selector:
            boolean:

        set_light_on_sunday:
          name: Включать ночник
          default: false
          selector:
            boolean:

    options_extra:
      name: Дополнительные настройки
      input:
        set_person_home:
          name: Учитывать местоположение персоны
          default: false
          selector:
            boolean:

        set_kettle_before_alarm:
          name: Включать чайник до будильника за 
          description: ""
          default:
          selector:
            time: {}

        set_kettle_before_alarm_sensor:
          name: Сенсор включения чайника до будильника за 
          description: ""
          default: []
          selector:
            entity:
              filter:
                - domain: 
                    - input_datetime
              multiple: false

        set_light_before_alarm:
          name: Включать ночник до будильника за
          description: ""
          default:
          selector:
            time: {}

        set_light_before_alarm_sensor:
          name: Сенсор включения ночника до будильника за
          description: ""
          default:
          selector:
            entity:
              filter:
                - domain: 
                    - input_datetime
              multiple: false

        set_temperature_boil:
          name: Температура кипячения
          description: Температура, ниже которой включается режим кипячения
          default: 1
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "°C"

        set_temperature_heat:
          name: Температура подогрева
          default: 1
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "°C"

trigger_variables:
  kettle_switch: !input kettle_switch
  light_switch: !input light_switch
  person_sensor: !input person_sensor

  set_alarm_workday: !input set_alarm_workday
  set_alarm_workday_sensor: !input set_alarm_workday_sensor
  set_alarm_saturday: !input set_alarm_saturday
  set_alarm_saturday_sensor: !input set_alarm_saturday_sensor
  set_alarm_sunday: !input set_alarm_sunday
  set_alarm_sunday_sensor: !input set_alarm_sunday_sensor

  set_kettle_before_alarm: !input set_kettle_before_alarm
  set_kettle_before_alarm_sensor: !input set_kettle_before_alarm_sensor
  set_light_before_alarm: !input set_light_before_alarm
  set_light_before_alarm_sensor: !input set_light_before_alarm_sensor

  set_kettle_on_workday: !input set_kettle_on_workday
  set_light_on_workday: !input set_light_on_workday
  set_kettle_on_saturday: !input set_kettle_on_saturday
  set_light_on_saturday: !input set_light_on_saturday
  set_kettle_on_sunday: !input set_kettle_on_sunday
  set_light_on_sunday: !input set_light_on_sunday

  set_temperature_boil: !input set_temperature_boil
  set_temperature_heat: !input set_temperature_heat

  kettle_on_workday_enabled: "{{ set_kettle_on_workday }}"
  kettle_on_saturday_enabled: "{{ set_kettle_on_saturday }}"
  kettle_on_sunday_enabled: "{{ set_kettle_on_sunday }}"

  light_on_workday_enabled: "{{ set_light_on_workday }}"
  light_on_saturday_enabled: "{{ set_light_on_saturday }}"
  light_on_sunday_enabled: "{{ set_light_on_sunday }}"

  set_person_home: !input set_person_home

  invalid_states:
    - ''                    
    - 'unavailable'         
    - 'unknown'             
    - 'none'                
    - 'None'                
    - 'null'         

variables:
  #########################################################################################
  ## Расчет времени задержки между повышением яркости при плавном включении света ночника
  #########################################################################################
  light_before_alarm_in_seconds: |
    {{ set_light_before_alarm.split(':')[0] | int * 3600 + set_light_before_alarm.split(':')[1] | int * 60 + set_light_before_alarm.split(':')[2] | int(0) }}
  light_delay_seconds: "{{ ((light_before_alarm_in_seconds | int / 254) | round(3) | string).split('.')[0] | int(0) }}"  
  light_delay_milliseconds: "{{ ((light_before_alarm_in_seconds | int / 254) | round(3) | string).split('.')[1] | int(0) }}"  

triggers:
  - trigger: template
    id: kettle_workday
    value_template: >-
      {% set alarm_workday = set_alarm_workday %}
      {% set kettle_before_alarm = set_kettle_before_alarm %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == (as_timestamp(today_at(alarm_workday)) - as_timestamp(today_at(kettle_before_alarm))) | timestamp_custom('%H:%M', false) }}
    enabled: "{{ now().weekday() < 5 }}"

  - trigger: template
    id: kettle_saturday
    value_template: >-
      {% set alarm_saturday = set_alarm_saturday %}
      {% set kettle_before_alarm = set_kettle_before_alarm %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == (as_timestamp(today_at(alarm_saturday)) - as_timestamp(today_at(kettle_before_alarm))) | timestamp_custom('%H:%M', false) }}
    enabled: "{{ now().weekday() == 5 }}"

  - trigger: template
    id: kettle_sunday
    value_template: >-
      {% set alarm_sunday = set_alarm_sunday %}
      {% set kettle_before_alarm = set_kettle_before_alarm %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == (as_timestamp(today_at(alarm_sunday)) - as_timestamp(today_at(kettle_before_alarm))) | timestamp_custom('%H:%M', false) }}
    enabled: "{{ now().weekday() == 6 }}"

  - trigger: template
    id: light_workday
    value_template: >-
      {% set alarm_workday = set_alarm_workday %}
      {% set light_before_alarm = set_light_before_alarm %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == (as_timestamp(today_at(alarm_workday)) - as_timestamp(today_at(light_before_alarm))) | timestamp_custom('%H:%M', false) }}
    enabled: "{{ now().weekday() < 5 }}"

  - trigger: template
    id: light_saturday
    value_template: >-
      {% set alarm_saturday = set_alarm_saturday %}
      {% set light_before_alarm = set_light_before_alarm %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == (as_timestamp(today_at(alarm_saturday)) - as_timestamp(today_at(light_before_alarm))) | timestamp_custom('%H:%M', false) }}
    enabled: "{{ now().weekday() == 5 }}"

  - trigger: template
    id: light_sunday
    value_template: >-
      {% set alarm_sunday = set_alarm_sunday %}
      {% set light_before_alarm = set_light_before_alarm %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == (as_timestamp(today_at(alarm_sunday)) - as_timestamp(today_at(light_before_alarm))) | timestamp_custom('%H:%M', false) }}
    enabled: "{{ now().weekday() == 6 }}"

conditions:
  - condition: template
    value_template: |
      {{ true if set_person_home == false else states(peson_sensor) == 'home' }}

actions:
  - choose:
      - conditions: # Чайник (будни)
          - condition: trigger
            id:
              - kettle_workday
          - condition: template
            value_template: "{{ kettle_on_workday_enabled }}"

        sequence: &ref_kettle
          - target:
              entity_id: !input kettle_switch
            data:
              temperature: "{{ set_temperature_heat | int }}"
            action: water_heater.set_temperature

          - target:
              entity_id: !input kettle_switch
            data:
              operation_mode: |
                {{ 'boil_heat' if (state_attr('water_heater.skykettle_rk_m216s','current_temperature') | int < 45 | int) else 'heat' }} 
            action: water_heater.set_operation_mode

      - conditions: # Чайник (суббота)
          - condition: trigger
            id:
              - kettle_saturday
          - condition: template
            value_template: "{{ kettle_on_saturday_enabled }}"

        sequence: *ref_kettle

      - conditions: # Чайник (воскресенье)
          - condition: trigger
            id:
              - kettle_sunday
          - condition: template
            value_template: "{{ kettle_on_sunday_enabled }}"

        sequence: *ref_kettle

      - conditions: # Ночник (будни)
          - condition: trigger
            id:
              - light_workday
          - condition: template
            value_template: "{{ light_on_workday_enabled }}"

        sequence: &ref_light
          - repeat:
              count: 254
              sequence:
                - data:
                    brightness: "{{ 254 / (254-1) * (repeat.index-1) + 1 }}"
                    color_temp_kelvin: 2000
                  action: light.turn_on
                  target:
                    entity_id: !input light_switch
                - delay: 
                    seconds: "{{ light_delay_seconds }}"
                    milliseconds: "{{ light_delay_milliseconds }}"

      - conditions: # Ночник (суббота)
          - condition: trigger
            id:
              - light_saturday
          - condition: template
            value_template: "{{ light_on_saturday_enabled }}"

        sequence: *ref_light

      - conditions: # Ночник (остальной день недели)
          - condition: trigger
            id:
              - light_sunday
          - condition: template
            value_template: "{{ light_on_sunday_enabled }}"

        sequence: *ref_light

mode: single
