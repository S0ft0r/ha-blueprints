- sensor:
    - name: "Forecast Live Icon"
      state: "{{ states('weather.forecast') }}"
      picture: >
          {% set weather = states('weather.forecast') %}
          {% set uv = state_attr('weather.forecast', 'uv_index') | float(0) %}
          {% set elevation = state_attr('sun.sun', 'elevation') | float(0) %}
          
          {# 1. ЛОГИКА УСЛОВИЙ И ВЕТРА #}
          {% set is_rain = weather in ['rainy', 'pouring', 'lightning-rainy', 'snowy-rainy'] %}
          {% set is_snow = weather in ['snowy', 'snowy-rainy'] %}
          {% set show_sun = weather in ['sunny', 'partlycloudy'] %}
          {% set show_clouds = weather in ['cloudy', 'partlycloudy', 'rainy', 'pouring', 'snowy', 'snowy-rainy'] %}
        
          {% set sky_color = '#a0c4ff' if weather in ['sunny', 'partlycloudy'] else '#7d8da1' %}
          {% set sky_opacity = 0.5 if weather in ['fog'] else 0 %}
          {% set sun_opacity = 0.5 if weather == 'partlycloudy' else 1.0 %}

          {% set bearing = state_attr('weather.forecast', 'wind_bearing') | float(0) %}
          {% set wind_dir = 1 if (bearing > 180 and bearing <= 360) else -1 %}
          {% set cloud_from = 25 if wind_dir == -1 else -15 %}
          {% set cloud_to = -15 if wind_dir == -1 else 25 %}
          {% set rain_slant = 4 * wind_dir %}

          {% if elevation < 0 %} {% set sun_fill_color = "#555555" %}
          {% elif uv >= 11 %} {% set sun_fill_color = "#b71c1c" %}
          {% elif uv >= 8 %} {% set sun_fill_color = "#d84315" %}
          {% elif uv >= 6 %} {% set sun_fill_color = "#fb8c00" %}
          {% elif uv >= 3 %} {% set sun_fill_color = "#fbc02d" %}
          {% else %} {% set sun_fill_color = "#fdd835" %} {% endif %}

          {# 2. СЛОЙ СОЛНЦА #}
          {% set sun_layer = "" %}
          {% if show_sun %}
            {% if uv < 3 %} {% set r_count, r_step = 5, 22.5 %}
            {% elif uv < 8 %} {% set r_count, r_step = 7, 15 %}
            {% else %} {% set r_count, r_step = 9, 11.25 %} {% endif %}
            {% set rays = namespace(path='') %}
            {% for i in range(r_count) %}
              {% set angle = 90 + (i * r_step) %}
              {% set rad = (angle * 3.14159 / 180) %}
              {% set x1, y1 = (8 * (rad | cos)) | round(2), (8 * (rad | sin)) | round(2) %}
              {% set x2, y2 = (14 * (rad | cos)) | round(2), (14 * (rad | sin)) | round(2) %}
              {% set rays.path = (rays.path ~ " M " ~ x1 ~ "," ~ y1 ~ " L " ~ x2 ~ "," ~ y2) %}
            {% endfor %}
            {% set sun_layer = "
            <g transform='translate(18, 5.3)' opacity='" ~ sun_opacity ~ "'>
              <path d='M 0,0 L -7,0 A 7,7 0 0 0 0,7 Z' fill='" ~ sun_fill_color ~ "' />
              <path d='" ~ rays.path ~ "' stroke='" ~ sun_fill_color ~ "' stroke-width='0.6' stroke-linecap='round' stroke-dasharray='3, 5'>
                <animate attributeName='stroke-dashoffset' from='16' to='0' dur='3s' repeatCount='indefinite' />
              </path>
            </g>" %}
          {% endif %}

          {# 3. ГЕНЕРАЦИЯ ОБЛАКОВ #}
          {% set cloud_color = '#e7e7e7ff' if weather == 'partlycloudy' else '#cac8c8ff' if weather == 'cloudy' else '#a9a9a9' %}
          {% set cloud_list = namespace(content='') %}
          {% if show_clouds %}
            {% set coverage = state_attr('weather.forecast', 'cloud_coverage') | int(50) %}
            {% set wind = state_attr('weather.forecast', 'wind_speed') | float(5) %}
            {% set c_count = ([ (coverage / 4) | int, 1 ] | max) %}
            {% set c_scale_base = 0.8 + (coverage / 100) * 1.5 %}
            {% for c in range(c_count) %}
              {% set s = (0.4 + (c * 0.12) % 1.6) * c_scale_base %}
              {% set d = (([ (60 - (wind * 1.5)), 5 ] | max) + (c * 4) % 15) | round(0) %}
              {% set y = (6.5 + (c * 1.3) % 7) / s %}
              {% set o = 0.3 + (c * 0.2) % 0.5 %}
              {% set b = -(c * 4.5) %}
              {% set cloud_list.content = cloud_list.content ~ "<g opacity='" ~ o ~ "' transform='scale(" ~ s ~ ")'><use href='#cloud' fill='" ~ cloud_color ~ "'><animateTransform attributeName='transform' type='translate' from='" ~ cloud_from ~ ", " ~ y ~ "' to='" ~ cloud_to ~ ", " ~ y ~ "' dur='" ~ d ~ "s' begin='" ~ b ~ "s' repeatCount='indefinite' /></use></g>" %}
            {% endfor %}
          {% endif %}

          {# 4. ГЕНЕРАЦИЯ ОСАДКОВ (ДОЖДЬ И СНЕГ) #}
          {% set rain_layer = "" %}
          {% if is_rain %}
            {% set rain_content = namespace(drops='') %}
            {% set r_cnt = 15 if weather == 'pouring' else 10 if weather == 'snowy-rainy' else 7 %}
            {% for r in range(r_cnt) %}
              {% set x = range(4, 16) | random %}
              {% set y_s = -(range(3, 15) | random) %}
              {% set d = (range(10, 25) | random / 10) %}
              {% set rain_content.drops = rain_content.drops ~ "<use href='#drop' opacity='" ~ (0.3 + (r*0.1)%0.5) ~ "'><animateTransform attributeName='transform' type='translate' from='" ~ x ~ ", " ~ y_s ~ "' to='" ~ (x + rain_slant) ~ ", 25' dur='" ~ d ~ "s' begin='-" ~ (r*0.2) ~ "s' repeatCount='indefinite' /></use>" %}
            {% endfor %}
            {% set rain_layer = "<g clip-path='url(#glass-area)' fill='#44739e'>" ~ rain_content.drops ~ "</g>" %}
          {% endif %}

          {% set snow_layer = "" %}
          {% if is_snow %}
            {% set snow_content = namespace(flakes='') %}
            {% set s_cnt = 12 if weather == 'snowy' else 8 %}
            {% for s in range(s_cnt) %}
              {% set x = range(4, 16) | random %}
              {% set y_s = -(range(3, 15) | random) %}
              {% set d = (range(40, 70) | random / 10) %}
              {% set snow_content.flakes = snow_content.flakes ~ "<use href='#flake' opacity='" ~ (0.5 + (s*0.1)%0.5) ~ "'><animateTransform attributeName='transform' type='translate' from='" ~ x ~ ", " ~ y_s ~ "' to='" ~ (x + rain_slant) ~ ", 25' dur='" ~ d ~ "s' begin='-" ~ (s * 0.5) ~ "s' repeatCount='indefinite' /></use>" %}
            {% endfor %}
            {% set snow_layer = "<g clip-path='url(#glass-area)' fill='white'>" ~ snow_content.flakes ~ "</g>" %}
          {% endif %}

          {# 5. ФИНАЛЬНЫЙ SVG #}
          {% set svg = "
          <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'>
            <defs>
              <clipPath id='glass-area'><rect x='5.9' y='5.3' width='12.1' height='13.7' /></clipPath>
              <path id='drop' d='M3,5 A1.5,1.5 0 0,1 1.5,3.5 C1.5,2.5 3,0.8 3,0.8 C3,0.8 4.5,2.5 4.5,3.5 A1.5,1.5 0 0,1 3,5 Z' />
              <path id='cloud' d='M-1.5,0.5 Q-1.5,-0.5 -0.5,-0.5 Q0,-0.5 0.5,0 Q1,-0.5 2,-0.5 Q3.5,0.5 3,2 L-1,2 Q-2,2 -2,1 Q-2,0.5 -1.5,0.5 Z' />
              <path id='flake' d='M20.79,13.95L18.46,14.57L16.46,13.44V10.56L18.46,9.43L20.79,10.05L21.31,8.12L19.54,7.65L20,5.88L18.07,5.36L17.45,7.69L15.45,8.82L13,7.38V5.12L14.71,3.41L13.29,2L12,3.29L10.71,2L9.29,3.41L11,5.12V7.38L8.5,8.82L6.5,7.69L5.92,5.36L4,5.88L4.47,7.65L2.7,8.12L3.22,10.05L5.55,9.43L7.55,10.56V13.45L5.55,14.58L3.22,13.96L2.7,15.89L4.47,16.36L4,18.12L5.93,18.64L6.55,16.31L8.55,15.18L11,16.62V18.88L9.29,20.59L10.71,22L12,20.71L13.29,22L14.7,20.59L13,18.88V16.62L15.5,15.17L17.5,16.3L18.12,18.63L20,18.12L19.53,16.35L21.3,15.88L20.79,13.95M9.5,10.56L12,9.11L14.5,10.56V13.44L12,14.89L9.5,13.44V10.56Z' transform='scale(0.2) translate(-12,-12)' fill='#0081fade' />
            </defs>
            <g transform='translate(2.4, 2.4) scale(0.8)'>
              <rect x='5.9' y='5.3' width='12.1' height='13.7' fill='" ~ sky_color ~ "' opacity='" ~ sky_opacity ~ "' />
              <g clip-path='url(#glass-area)'>
                " ~ sun_layer ~ "
                " ~ cloud_list.content ~ "
              </g>
              " ~ rain_layer ~ "
              " ~ snow_layer ~ "
              <path d='M 20,19 V 3 H 4 V 19 H 2 v 2 H 22 V 19 H 20 M 6,19 5.91,5.32 17.94,5.26 18,19 Z' fill='#44739e'/>
            </g>
          </svg>" %}
          
          data:image/svg+xml,{{ svg | urlencode }}
