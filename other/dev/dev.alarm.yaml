triggers:
  - trigger: template
    value_template: >-
      {% set ktwd = (((state_attr('input_datetime.alarm_clock_1_workday', 'timestamp')) -
        (states('input_number.kettle_until_alarm') | int*60)) | timestamp_custom('%H:%M', false)) %} 
      {{ states('sensor.time') == ktwd }}
    id: kettle_workday
    enabled: "{{ now().weekday() < 5 }}"

  - trigger: template
    value_template: >-
      {% set awd = states('input_boolean.alarm_1_workday') %} 
      {% set aonce = states('input_boolean.alarm_1_once') %} 
      {% set asa = states('input_boolean.alarm_1_saturday') %} 
      {% set asu = states('input_boolean.alarm_1_sunday') %} 
      {% set ltwd = (((state_attr('input_datetime.alarm_clock_1_workday', 'timestamp')) -
        (states('input_number.light_until_alarm') | int*60)) | timestamp_custom('%H:%M', false)) %} 
      {% set ltonce = (((state_attr('input_datetime.alarm_clock_1_once', 'timestamp')) -
        (states('input_number.light_until_alarm') | int*60)) | timestamp_custom('%H:%M', false)) %} 
      {% set ltsa = (((state_attr('input_datetime.alarm_clock_1_saturday', 'timestamp')) -
        (states('input_number.light_until_alarm') | int*60)) | timestamp_custom('%H:%M', false)) %} 
      {% set ltsu = (((state_attr('input_datetime.alarm_clock_1_sunday', 'timestamp')) -
        (states('input_number.light_until_alarm') | int*60)) | timestamp_custom('%H:%M', false)) %} 
      {% set sa = (now().weekday() == 5) %} 
      {% set su = (now().weekday() == 6) %} 
      {% set le = states('input_boolean.light_on_1') %} 
      {% set wd = states('binary_sensor.workday_sensor') %}

      {{ (awd == 'on' and states('sensor.time') == ltwd and le == 'on' and wd =='on')  
        or (asa == 'on' and states('sensor.time') == ltsa and le == 'on' and sa == true)  
        or (asu == 'on' and states('sensor.time') == ltsu and le  == 'on' and su == true)  
        or (aonce == 'on' and states('sensor.time') == ltonce and le == 'on') }}
    id: light

  - trigger: template
    value_template: >-
      {% set aonce = states('input_boolean.alarm_1_once') %} 
      {% set tonce = (state_attr('input_datetime.alarm_clock_1_once', 'timestamp'))|timestamp_custom('%H:%M', false) %}  

      {{ aonce == 'on' and states('sensor.time') == tonce }}
    id: once

conditions:
  - condition: state
    entity_id: !input person_sensor
    state:
      - home

actions:
  - choose:
      - conditions: # Чайник на кипячение
          - condition: trigger
            id:
              - kettle_workday

          - condition: template
            value_template: "{{ state_attr(kettle_switch,'current_temperature') | int < set_temperature_boil | int }}"

          # - condition: template
          #   value_template: |
          #     {{ now().weekday() < 5 }}

        sequence:
          - target:
              entity_id: !input kettle_switch
            data:
              temperature: "{{ set_temperature_heat | int }}"
            action: water_heater.set_temperature

          - target:
              entity_id: !input kettle_switch
            data:
              operation_mode: boil_heat
            action: water_heater.set_operation_mode

      - conditions: # Чайник на подогрев
          - condition: trigger
            id:
              - kettle_workday

          - condition: template
            value_template: "{{ state_attr(kettle_switch,'current_temperature') | int > set_temperature_boil | int }}"

          - condition: template
            value_template: |
              {{ now().weekday() < 5 }}

        sequence:
          - target:
              entity_id: !input kettle_switch
            data:
              temperature: "{{ set_temperature_heat | int }}"
            action: water_heater.set_temperature
          - target:
              entity_id: !input kettle_switch
            data:
              operation_mode: heat
            action: water_heater.set_operation_mode

      - conditions: # Ночник
          - condition: trigger
            id:
              - light
          - condition: template
            value_template: "{{ states(light_switch) not in invalid_states }}"
        sequence:
          - repeat:
              count: 254
              sequence:
                - data:
                    brightness: "{{ 254 / (254-1) * (repeat.index-1) + 1 }}"
                    color_temp_kelvin: 2000
                  action: light.turn_on
                  target:
                    entity_id: !input light_switch
                - delay:
                    hours: 0
                    minutes: 0
                    seconds: 2
                    milliseconds: 0

      - conditions: # Чайник на подогрев
          - condition: trigger
            id:
              - once
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.alarm_1_once

mode: single

