blueprint:
  name: Управление ночником и чайником по будильнику
  description: |
    ### Будильник с управлением устройствами.
    <small>Версия 2026.06.01 Сборка 2</small> 

    <small><a href="https://github.com/S0ft0r/ha-blueprints/blob/main/as-is.md">Отказ от ответственности</a></small>
  domain: automation
  source_url: https://github.com/S0ft0r/ha-blueprints/blob/main/other/dev/dev.alarm.yaml
  author: Softor

  # TODO:
  # - Определять рассвет - включать ли свет после рассвета.
  # - Поднимать жалюзи в спальне
  # - Включать дополнительную технику (ТВ, радио и т.д.)
  # - Проговаривать на колонку фразу
  # - Включать музыку


  input: 
    time_alarm:
      name: Будильник
      description: Установка будильника
      selector:
        time: {}

    alarm_section:
      name: Настройка работы будильника
      input:
        alarm_on_days:
          name: Включение будильника
          description: |
            Выбор дней для включения будильника
          default: []
          selector:
            select:
              options:
                - label: Понедельник
                  value: mon
                - label: Вторник
                  value: tue
                - label: Среда
                  value: wed
                - label: Четверг
                  value: thu
                - label: Пятница
                  value: fri
                - label: Суббота
                  value: sat
                - label: Воскресенье
                  value: sun
              sort: false
              multiple: true
              custom_value: false
              mode: list

        alarm_on_options:
          selector:
            select:
              options:
                - label: Учитывать присутствие персоны в доме
                  value: on_person
                - label: Включение чайника
                  value: on_kettle
                - label: Включение ночника
                  value: on_light
                - label: Проговаривание фразы
                  value: on_phrase
                - label: Включение музыки
                  value: on_music

    kettle_section:
      name: Настройка чайника
      input:
        kettle_switch:
          name: Чайник
          description: |
            Чайник
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - water_heater
              multiple: false

        set_kettle_before_alarm:
          name: Включать чайник до будильника за 
          description: ""
          default: "00:00:00"
          selector:
            time: {}

        set_temperature_boil:
          name: Температура кипячения
          description: Температура, ниже которой включается режим кипячения
          default: 1
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "°C"

        set_temperature_heat:
          name: Температура подогрева
          default: 1
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "°C"

    light_section:
      name: Настройка ночника
      input:
        light_switch:
          name: Ночник
          description: ""
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - light
              multiple: true

        set_light_before_alarm:
          name: Включать ночник до будильника за
          description: ""
          default: "00:00:00"
          selector:
            time: {}

    person_section:
      name: Настройка персоны
      input:
        person_sensor:
          name: Персона
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - person
              multiple: false

    media_section:
      name: Настройка медиаплейера
      description: Алиса
      input:
        media_player:
          name: Медиаплейер
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - media_player
              multiple: false

        set_phrase:
          name: Фраза 
          default: "Вставай, соня. Пора творить!"
          selector:
            text: 

        set_command_music:
          name: Текстовая фраза для включения музыки
          default: "Алиса, включи пение птиц"
          selector:
            text: 

trigger_variables:
  time_alarm: !input time_alarm
  kettle_switch: !input kettle_switch
  light_switch: !input light_switch
  person_sensor: !input person_sensor
  media_player: !input media_player

  alarm_on_days: !input alarm_on_days
  alarm_on_options: !input alarm_on_options

  set_kettle_before_alarm: !input set_kettle_before_alarm
  set_light_before_alarm: !input set_light_before_alarm

  set_temperature_boil: !input set_temperature_boil
  set_temperature_heat: !input set_temperature_heat

  person_home_enabled: "{{ 'on_person' in alarm_on_options }}"
  kettle_enabled: "{{ 'on_kettle' in alarm_on_options }}"
  light_enabled: "{{ 'on_light' in alarm_on_options }}"
  phrase_enabled: "{{ 'on_phrase' in alarm_on_options }}"
  music_enabled: "{{ 'on_music' in alarm_on_options }}"

  invalid_states:
    - ''                    
    - 'unavailable'         
    - 'unknown'             
    - 'none'                
    - 'None'                
    - 'null'         

variables:
  light_before_alarm_in_seconds: |
    {{ set_light_before_alarm.split(':')[0] | int * 3600 + set_light_before_alarm.split(':')[1] | int * 60 + set_light_before_alarm.split(':')[2] | int }}
  light_delay_seconds: "{{ ((light_before_alarm_in_seconds | int / 254) | round(3) | string).split('.')[0] | int }}"  
  light_delay_milliseconds: "{{ ((light_before_alarm_in_seconds | int / 254) | round(3) | string).split('.')[1] | int }}"  

triggers:
  - trigger: template
    id: kettle_on
    value_template: >-
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == (as_timestamp(today_at(time_alarm)) - as_timestamp(today_at(set_kettle_before_alarm))) | timestamp_custom('%H:%M', false) }}
    enabled: "{{ kettle_enabled and now().strftime('%a') | lower in alarm_on_days }}"

  - trigger: template
    id: light_on
    value_template: >-
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == (as_timestamp(today_at(time_alarm)) - as_timestamp(today_at(set_light_before_alarm))) | timestamp_custom('%H:%M', false) }}
    enabled: "{{ light_enabled and now().strftime('%a') | lower in alarm_on_days }}"

conditions:
  - condition: template
    value_template: |
      {{ true if set_person_home == false else states(peson_sensor) == 'home' }}

actions:
  - choose:
      - conditions: # Чайник на кипячение
          - condition: trigger
            id:
              - kettle_on

        sequence: 
          - target:
              entity_id: !input kettle_switch
            data:
              temperature: "{{ set_temperature_heat | int }}"
            action: water_heater.set_temperature

          - target:
              entity_id: !input kettle_switch
            data:
              operation_mode: |
                {{ 'boil_heat' if (state_attr('water_heater.skykettle_rk_m216s','current_temperature') | int < 45 | int) else 'heat' }}
            action: water_heater.set_operation_mode

      - conditions: # Ночник
          - condition: trigger
            id:
              - light_on

        sequence: 
          - repeat:
              count: 254
              sequence:
                - data:
                    brightness: "{{ 254 / (254-1) * (repeat.index-1) + 1 }}"
                    color_temp_kelvin: 2000
                  action: light.turn_on
                  target:
                    entity_id: !input light_switch
                - delay: 
                    seconds: "{{ light_delay_seconds }}"
                    milliseconds: "{{ light_delay_milliseconds }}"

