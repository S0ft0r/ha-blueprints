      name: Чайник
      description: |
        Чайник
      selector:
        entity:
          filter:
            - domain:
                - water_heater
          multiple: false

    light_switch:
      name: Ночник
      description: ""
      selector:
        entity:
          filter:
            - domain:
                - light
          multiple: true

    person_sensor:
