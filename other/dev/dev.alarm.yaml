          name: Время включения будильника
          description: ""
          default:
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_datetime
                      multiple: false

        set_kettle_on_workday:
          name: Включать чайник
          default: false
          selector:
            boolean:

