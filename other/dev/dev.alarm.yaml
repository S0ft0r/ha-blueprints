blueprint:
  name: Управление ночником и чайником по будильнику
  description: |
    ### Управление ночником и чайником по будильнику.
    <small>Версия 2026.06.01 Сборка 1</small> 

    <small><a href="https://github.com/S0ft0r/ha-blueprints/blob/main/as-is.md">Отказ от ответственности</a></small>
  domain: automation
  source_url: https://github.com/S0ft0r/ha-blueprints/blob/main/other/dev/dev.alarm.yaml
  author: Softor

  input:
    kettle_switch:
      name: Чайник
      description: |
        Чайник
      selector:
        entity:
          filter:
            - domain:
                - water_heater
          multiple: false

    light_switch:
      name: Ночник
      description: ""
      selector:
        entity:
          filter:
            - domain:
                - light
          multiple: true

    person_sensor:
      name: Персон
      selector:
        entity:
          filter:
            - domain:
                - person
          multiple: false


    options_workday:
      name: Будни
      input:
        set_alarm_workday_enabled:
          name: Включение будильника в будни
          selector:
            choose:
              choices:
                'выбор':
                  selector:
                    boolean:
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_boolean
                      multiple: false

        set_alarm_workday:
          name: Время включения будильника в будни
          description: Время включения будильника в будни
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_datetime
                      multiple: false

        set_kettle_on_workday:
          name: Включать чайник
          selector:
            boolean:
        set_light_on_workday:
          name: Включать ночник
          selector:
            boolean:

    options_saturday:
      name: Будни
      input:
        set_alarm_saturday_enabled:
          name: Включение будильника в будни
          selector:
            choose:
              choices:
                'выбор':
                  selector:
                    boolean:
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_boolean
                      multiple: false

        set_alarm_saturday:
          name: Время включения будильника в будни
          description: Время включения будильника в будни
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_datetime
                      multiple: false

        set_kettle_on_saturday:
          name: Включать чайник
          selector:
            boolean:
        set_light_on_saturday:
          name: Включать ночник
          selector:
            boolean:

    options_sunday:
      name: Будни
      input:
        set_alarm_sunday_enabled:
          name: Включение будильника в будни
          selector:
            choose:
              choices:
                'выбор':
                  selector:
                    boolean:
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_boolean
                      multiple: false

        set_alarm_sunday:
          name: Время включения будильника в будни
          description: Время включения будильника в будни
          selector:
          default:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_datetime
                      multiple: false

        set_kettle_on_sunday:
          name: Включать чайник
          selector:
            boolean:
        set_light_on_sunday:
          name: Включать ночник
          selector:
            boolean:

    options_once:
      name: Будни
      input:
        set_alarm_once_enabled:
          name: Включение будильника в будни
          selector:
            choose:
              choices:
                'выбор':
                  selector:
                    boolean:
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_boolean
                      multiple: false

        set_alarm_once:
          name: Время включения будильника в будни
          description: Время включения будильника в будни
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_datetime
                      multiple: false

        set_kettle_on_once:
          name: Включать чайник
          selector:
            boolean:
        set_light_on_once:
          name: Включать ночник
          selector:
            boolean:

    options_extra:
      name: Будни
      input:
        set_kettle_before_alarm:
          name: Время включения будильника в будни
          description: Время включения будильника в будни
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_datetime
                      multiple: false

        set_light_before_alarm:
          name: Время включения будильника в будни
          description: Время включения будильника в будни
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_datetime
                      multiple: false

        set_temperature_boil:
          name: Температура кипячения
          description: Температура, ниже которой включается режим кипячения
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "°C"

        set_temperature_heat:
          name: Температура подогрева
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "°C"

trigger_variables:
  kettle_switch: !input kettle_switch
  light_switch: !input light_switch
  person_sensor: !input person_sensor

  set_alarm_workday_enabled: !input set_alarm_workday_enabled
  set_alarm_saturday_enabled: !input set_alarm_saturday_enabled
  set_alarm_sunday_enabled: !input set_alarm_sunday_enabled
  set_alarm_once_enabled: !input set_alarm_once_enabled

  set_alarm_workday: !input set_alarm_workday
  set_alarm_saturday: !input set_alarm_saturday
  set_alarm_sunday: !input set_alarm_sunday
  set_alarm_once: !input set_alarm_once

  set_kettle_before_alarm: !input set_kettle_before_alarm
  set_light_before_alarm: !input set_light_before_alarm

  set_kettle_on_workday: !input set_kettle_on_workday
  set_light_on_workday: !input set_light_on_workday
  set_kettle_on_saturday: !input set_kettle_on_saturday
  set_light_on_saturday: !input set_light_on_saturday
  set_kettle_on_sunday: !input set_kettle_on_sunday
  set_light_on_sunday: !input set_light_on_sunday
  set_kettle_on_once: !input set_kettle_on_once
  set_light_on_once: !input set_light_on_once

  set_temperature_boil: !input set_temperature_boil
  set_temperature_heat: !input set_temperature_heat


variables:
  invalid_states:
    - ''                    
    - 'unavailable'         
    - 'unknown'             
    - 'none'                
    - 'None'                
    - 'null'         

  chosen_alarm_workday_enabled: "{{ set_alarm_workday_enabled.active_choice }}"

  chosen_alarm_workday: "{{ set_alarm_workday.active_choice }}"
  chosen_alarm_saturday: "{{ set_alarm_saturday.active_choice }}"
  chosen_alarm_sunday: "{{ set_alarm_sunday.active_choice }}"
  chosen_alarm_once: "{{ set_alarm_once.active_choice }}"

  chosen_kettle_before_alarm: "{{ set_kettle_before_alarm.active_choice }}"
  chosen_light_before_alarm: "{{ set_light_before_alarm.active_choice }}"

  alarm_workday: "{{ set_alarm_workday.время if chosen_alarm_workday == 'время' else states(set_alarm_workday.сенсор) }}"
  alarm_saturday: "{{ set_alarm_saturday.время if chosen_alarm_saturday == 'время' else states(set_alarm_saturday.сенсор) }}"
  alarm_sunday: "{{ set_alarm_sunday.время if chosen_alarm_sunday == 'время' else states(set_alarm_sunday.сенсор) }}"
  alarm_once: "{{ set_alarm_once.время if chosen_alarm_once == 'время' else states(set_alarm_once.сенсор) }}"

  kettle_before_alarm: "{{ set_kettle_before_alarm.время if chosen_kettle_before_alarm == 'время' else states(set_kettle_before_alarm.сенсор) }}"
  light_before_alarm: "{{ set_light_before_alarm.время if chosen_light_before_alarm == 'время' else states(set_light_before_alarm.сенсор) }}"

