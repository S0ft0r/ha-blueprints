blueprint:
  name: Мониторинг системы отопления
  description: |
    ### Мониторинг термостатов и обогревателей.
    <small>Версия 2026.07.01 Сборка 4</small>

    Проверки:
    - хитер включён, но мощность нулевая
    - хитер выключен, но мощность ненулевая
    - автоматический перезапуск проблемного обогревателя
    - обогреватели и сенсоры мощности определяются автоматически

    <small><a href="https://github.com/S0ft0r/ha-blueprints/blob/main/as-is.md">Отказ от ответственности</a></small>
  domain: automation
  source_url: https://raw.githubusercontent.com/S0ft0r/ha-blueprints/main/other/dev/dev.heating.yaml
  author: Softor

  input:
    thermostats:
      name: Термостаты
      description: Все термостаты системы отопления
      selector:
        entity:
          filter:
            - domain: climate
          multiple: true

    settings_section:
      name: Настройки проверок
      icon: mdi:thermometer-alert
      input:
        check_power_enabled:
          name: Проверять мощность обогревателя
          description: |
            Если включено, система будет проверять,
            соответствует ли потребляемая мощность
            состоянию обогревателя.
          default: false
          selector:
            boolean: {}

        power_check_delay:
          name: Задержка проверки мощности
          description: |
            Время ожидания после смены режима нагрева
            перед проверкой мощности.
            Нужно, чтобы хитер успел включиться/выключиться
            и сенсор мощности обновился.
          default: 30
          selector:
            number:
              min: 5
              max: 120
              step: 5
              mode: slider
              unit_of_measurement: "сек"

        power_zero_threshold:
          name: Порог нулевой мощности
          description: |
            Мощность ниже этого значения считается нулевой.
            Учитывает погрешность измерения.
          default: 5
          selector:
            number:
              min: 0
              max: 50
              step: 1
              mode: slider
              unit_of_measurement: "Вт"

        restart_on_problem:
          name: Перезапускать проблемный обогреватель
          description: |
            При обнаружении несоответствия мощности —
            выключить и снова включить связанный обогреватель.
          default: false
          selector:
            boolean: {}

        restart_delay:
          name: Пауза при перезапуске
          description: Время между выключением и включением обогревателя
          default: 10
          selector:
            number:
              min: 5
              max: 60
              step: 5
              mode: slider
              unit_of_measurement: "сек"

    notify_section:
      name: Уведомления
      icon: mdi:bell-outline
      collapsed: true
      input:
        notify_target:
          name: Получатель уведомлений
          default: []
          selector:
            entity:
              filter:
                - domain: notify
              multiple: true

trigger_variables:
  thermostats: !input thermostats
  check_power_enabled: !input check_power_enabled
  power_zero_threshold: !input power_zero_threshold
  power_check_delay: !input power_check_delay
  restart_on_problem: !input restart_on_problem
  restart_delay: !input restart_delay
  notify_target: !input notify_target

  invalid_states:
    - ""
    - "unavailable"
    - "unknown"
    - "none"

triggers:
  - trigger: state
    entity_id: !input thermostats
    attribute: hvac_action
    to: "heating"
    id: heating_started
    for: 
      seconds: !input power_check_delay

  - trigger: state
    entity_id: !input thermostats
    attribute: hvac_action
    to: "idle"
    id: heating_stopped
    for: 
      seconds: !input power_check_delay

variables:
  triggered_therm: "{{ trigger.entity_id }}"
  triggered_name: "{{ state_attr(triggered_therm, 'friendly_name') | default(triggered_therm) }}"

  triggered_dev: "{{ device_id(triggered_therm) }}"
  triggered_entities: "{{ device_entities(triggered_dev) if triggered_dev else [] }}"

  triggered_heater: >
    {{ triggered_entities
       | select('match', 'switch.')
       | list | first | default('') }}

  triggered_power_sensor: >
    {% set ps = namespace(entity='') %}
    {% for ent in triggered_entities %}
      {% if ent.startswith('sensor.') and ps.entity == '' %}
        {% if state_attr(ent, 'device_class') == 'power'
           or 'power' in ent %}
          {% set ps.entity = ent %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ps.entity }}

  current_temp: "{{ state_attr(triggered_therm, 'current_temperature') | float(-999) }}"
  target_temp: "{{ state_attr(triggered_therm, 'temperature') | float(-999) }}"

actions:
  - choose:

      #####################################################################
      # НАЧАЛ ГРЕТЬ
      #####################################################################

      - conditions:
          - condition: trigger
            id:
              - heating_started

          - condition: template
            value_template: "{{ check_power_enabled and triggered_power_sensor != '' }}"

        sequence:
          - variables:
              power_now: "{{ states(triggered_power_sensor) | float(-1) }}"

          - if:
              - condition: template
                value_template: >
                  {{ power_now >= 0 and power_now < (power_zero_threshold | float(5)) }}
            then:
              - action: logbook.log
                data:
                  name: "Отопление"
                  message: >
                    {{ triggered_name }} — обогреватель включён,
                    но мощность {{ power_now }} Вт
                  entity_id: "{{ triggered_therm }}"

              - if:
                  - condition: template
                    value_template: "{{ notify_target != [] }}"
                then:
                  - action: notify.send_message
                    target:
                      entity_id: !input notify_target
                    data:
                      title: "Отопление: возможна неисправность"
                      message: >
                        {{ triggered_name }} — обогреватель включён,
                        но мощность {{ power_now }} Вт
                    continue_on_error: true

              # Перезапуск
              - if:
                  - condition: template
                    value_template: "{{ restart_on_problem and triggered_heater != '' }}"
                then:
                  - action: homeassistant.turn_off
                    target:
                      entity_id: "{{ triggered_heater }}"
                  - delay:
                      seconds: "{{ restart_delay | int(10) }}"
                  - action: homeassistant.turn_on
                    target:
                      entity_id: "{{ triggered_heater }}"
                  - action: logbook.log
                    data:
                      name: "Отопление"
                      message: "Перезапущен: {{ triggered_heater }}"
                      entity_id: "{{ triggered_heater }}"

      #####################################################################
      # ПЕРЕСТАЛ ГРЕТЬ
      #####################################################################

      - conditions:
          - condition: trigger
            id:
              - heating_stopped

          - condition: template
            value_template: "{{ check_power_enabled and triggered_power_sensor != '' }}"
        sequence:
          - variables:
              power_now: "{{ states(triggered_power_sensor) | float(-1) }}"

          - if:
              - condition: template
                value_template: >
                  {{ power_now > (power_zero_threshold | float(5)) }}
            then:
              - action: logbook.log
                data:
                  name: "Отопление"
                  message: >
                    {{ triggered_name }} — обогреватель выключен,
                    но мощность {{ power_now }} Вт
                  entity_id: "{{ triggered_therm }}"

              - if:
                  - condition: template
                    value_template: "{{ notify_target != [] }}"
                then:
                  - action: notify.send_message
                    target:
                      entity_id: !input notify_target
                    data:
                      title: "Отопление: возможна неисправность"
                      message: >
                        {{ triggered_name }} — обогреватель выключен,
                        но мощность {{ power_now }} Вт
                    continue_on_error: true

              # Перезапуск
              - if:
                  - condition: template
                    value_template: "{{ restart_on_problem and triggered_heater != '' }}"
                then:
                  - action: homeassistant.turn_off
                    target:
                      entity_id: "{{ triggered_heater }}"
                  - delay:
                      seconds: "{{ restart_delay | int(10) }}"
                  - action: homeassistant.turn_on
                    target:
                      entity_id: "{{ triggered_heater }}"
                  - action: logbook.log
                    data:
                      name: "Отопление"
                      message: "Перезапущен: {{ triggered_heater }}"
                      entity_id: "{{ triggered_heater }}"

mode: queued
max: 10