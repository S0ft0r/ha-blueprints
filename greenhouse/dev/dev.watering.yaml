blueprint:
  name: Управление поливом теплицы
  description: |
    ### Управление поливом теплицы.
    <small>Версия 2026.05.01 Сборка 2</small> 
    
    <small><a href="https://github.com/S0ft0r/ha-blueprints/blob/main/as-is.md">Отказ от ответственности</a></small>
  domain: automation
  source_url: https://raw.githubusercontent.com/S0ft0r/ha-blueprints/main/greenhouse/dev/dev.watering.yaml
  author: Softor

  input:
    watering_switch:
      name: Реле/клапан включения полива
      description: |
        Реле/клапан включения полива
        <small>* Поддерживается домены switch и valve</small>
      selector:
        entity:
          filter:
            - domain:
                - switch
                - valve
          reorder: false
          multiple: false

    pump_off_auto:
      name: Таймер автоматического отключения
      description: |
        Обязательный параметр - вспомогательный элемент timer - для отсчета автоматического отключения электромагнитного калпана клапана 
      selector:
        entity:
          filter:
            - domain:
                - timer
          reorder: false
          multiple: false

    morning_section:
      name: Настройки системы для работы утром
      description: |
        Устанавливается время включения, режим работы полива.
      icon: mdi:clock-time-four-outline
      input:
        set_pump_morning_enable:
          name: Включение полива утром
          default: false
          selector:
            boolean: {}

        set_on_time_morning:
          name: Включить утром в
          default: "08:00:00"
          selector:
            time: {}

        set_time_work_morning:
          name: Включать на
          description: |
            Время, на которое включается полив 
            <small>* На каждое направление</small>
          default: "00:10:00"
          selector:
            time: {}

        set_working_day_morning:
          name: Режим работы полива
          default: every_day_morning
          selector:
            select:
              options:
                - label: Ежедневно
                  value: every_day_morning
                - label: Через день
                  value: every_over_day_morning
                - label: Выбор дней
                  value: select_morning
#              mode: dropdown
              mode: list
              multiple: false

        set_select_days_morning:
          name: Выбор дней 
          description: |
            Включение полива по дням
            <small>* Работает при включенном режим работы <em>Выбор дней</em></small>
          default: []
          selector:
            select:
              options:
                - label: Понедельник
                  value: mon
                - label: Вторник
                  value: tue
                - label: Среда
                  value: wed
                - label: Четверг
                  value: thu
                - label: Пятница
                  value: fri
                - label: Суббота
                  value: sat
                - label: Воскресенье
                  value: sun
              sort: false
              multiple: true
              custom_value: false
              mode: list

    evening_section:
      name: Настройки системы для работы вечером
      description: |
        Устанавливается время включения, режим работы системы полива.
      icon: mdi:clock-time-eight-outline
      input:
        set_pump_evening_enable:
          name: Включение вечером
          default: false
          selector:
            boolean: {}

        set_on_time_evening:
          name: Включить вечером в
          default: "20:00:00"
          selector:
            time: {}

        set_time_work_evening:
          name: Включать на
          description: |
            Время, на которое включается полив 
            <small>* На каждое направление</small>
          default: "00:10:00"
          selector:
            time: {}

        set_working_day_evening:
          name: Режим включения вечером
          description: |
            Выбор режима включения полива в вечернее время
          default: every_day_evening
          selector:
            select:
              options:
                - label: Ежедневно
                  value: every_day_evening
                - label: Через день
                  value: every_over_day_evening
                - label: Выбор
                  value: select_evening
              mode: list
              multiple: false

        set_select_days_evening:
          name: Выбор дней 
          description: |
            Включение полива по дням
            <small>* Работает при включенном режим работы <em>Выбор дней</em></small>
          default: []
          selector:
            select:
              options:
                - label: Понедельник
                  value: mon
                - label: Вторник
                  value: tue
                - label: Среда
                  value: wed
                - label: Четверг
                  value: thu
                - label: Пятница
                  value: fri
                - label: Суббота
                  value: sat
                - label: Воскресенье
                  value: sun
              sort: false
              multiple: true
              custom_value: false
              mode: list

    extra_section:
      name: Дополнительные настройки системы
      description: |
        Устанавливается дополнительные настройки.
      icon: mdi:cog
      input:
        waterpump_switch:
          name: Реле насоса
          description: ""
          selector:
            entity:
              filter:
                - domain:
                    - switch
                    - valve
              reorder: false
              multiple: false

        set_time_waterpump_work: # Стоит переделать на number - минуты
          name: Включать насос на
          description: | 
            Время, на которое включается насос перед и после полива
            <small>* При отсутствии людей в доме</small> 
          # default: "00:01:00"
          # selector:
          #   time: {}

          selector:
            choose:
              choices:
                'время':
                  # default: "00:01:00"
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain: 
                            - input_datetime
                      multiple: false


        watervalve_switch:
          name: Клапаны направления
          description: ""
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
                    - valve
              reorder: false
              multiple: true

        set_watervalve_open_delay:
          name: Задержка открытия клапана направления
          description: Время ожидания полного открытия клапана направления
          default: 5
          selector:
            number:
              min: 1
              max: 300
              mode: slider
              unit_of_measurement: "сек"

        set_watervalve_close_delay:
          name: Задержка закрытия клапана направления
          description: Время ожидания полного закрытия клапана направления
          default: 5
          selector:
            number:
              min: 1
              max: 300
              mode: slider
              unit_of_measurement: "сек"

        set_auto_off_pump_time:
          name: Время работы до автоотключения
          description: |
            * Минимальное время. Если сумма времени работы каждого направление больше, то будет произведен персчет.  
          default: "00:30:00"
          selector:
            time: {}

trigger_variables:
  watering_switch: !input watering_switch
  watervalve_switch: !input watervalve_switch
  waterpump_switch: !input waterpump_switch
  pump_off_auto: !input pump_off_auto

  set_pump_morning_enable: !input set_pump_morning_enable 
  set_pump_evening_enable: !input set_pump_evening_enable 

  set_on_time_morning: !input set_on_time_morning
  set_on_time_evening: !input set_on_time_evening

  set_time_work_morning: !input set_time_work_morning
  set_time_work_evening: !input set_time_work_evening
  set_time_waterpump_work: !input set_time_waterpump_work

  set_working_day_morning: !input set_working_day_morning
  set_working_day_evening: !input set_working_day_evening
  set_select_days_morning: !input set_select_days_morning
  set_select_days_evening: !input set_select_days_evening

  set_auto_off_pump_time: !input set_auto_off_pump_time

  set_watervalve_open_delay: !input set_watervalve_open_delay
  set_watervalve_close_delay: !input set_watervalve_close_delay

  open_states:
    - 'on'
    - 'open'

  closed_states:
    - 'off'
    - 'closed'

  invalid_states:
    - ''                    
    - 'unavailable'         
    - 'unknown'             
    - 'none'                
    - 'None'                
    - 'null'       

  pump_evening_enable: "{{ set_pump_evening_enable and waterpump_switch != [] }}"                            
  pump_evening_morning: "{{ set_pump_morning_enable and waterpump_switch != [] }}"                            

variables:
  selected_days_morning: |
    {{ now().strftime('%a') | lower in set_select_days_morning }}

  selected_days_evening: |
    {{ now().strftime('%a') | lower in set_select_days_evening }}

triggers:
  - trigger: template
    value_template: >-
      {% set on_time_morning = set_on_time_morning %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == as_timestamp(today_at(on_time_morning)) | timestamp_custom('%H:%M') }}
    id: on_morning_trigger
    enabled: "{{ pump_morning_enable }}"

  - trigger: template
    value_template: >-
      {% set on_time_evening = set_on_time_evening %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == as_timestamp(today_at(on_time_evening)) | timestamp_custom('%H:%M') }}
    id: on_evening_trigger
    enabled: "{{ pump_morning_enable }}"

  - entity_id: !input pump_off_auto
    from: active
    to: idle
    trigger: state
    id: pump_off_auto_trigger

  - trigger: state
    entity_id: !input watervalve_switch
    id: watervalve_switch_on_trigger
    to: "on"
    from: "off"

  - trigger: state
    entity_id: !input watervalve_switch
    id: watervalve_switch_off_trigger
    to: "off"
    from: "on"
    for:
      seconds: 5

  - entity_id: !input watering_switch
    trigger: state
    id: watering_toggle_trigger

  - trigger: template
    value_template: >-
      {% set on_time_morning = set_on_time_morning %}
      {% set time_waterpump_work = set_time_waterpump_work %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == as_timestamp(today_at(on_time_morning) - time_waterpump_work | as_timedelta) | timestamp_custom('%H:%M') }}
    id: time_before_morning_trigger
    enabled: !input pump_morning_enable

  - trigger: template
    value_template: >-
      {% set on_time_evening = set_on_time_evening %}
      {% set time_waterpump_work = set_time_waterpump_work %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == as_timestamp(today_at(on_time_evening) - time_waterpump_work | as_timedelta) | timestamp_custom('%H:%M') }}
    id: time_before_evening_trigger
    enabled: !input pump_evening_enable

actions:
  - choose:

#######################################################################################
# Ручное выключение направления
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - watervalve_switch_off_trigger
          - condition: template
            value_template: |
              {{ (watervalve_switch | count) > 0 }}
          - condition: template
            value_template: |
              {% set i = namespace(item=int(0)) %}
              {% for switch in watervalve_switch %}
                {% set i.item = i.item + (1 if is_state(switch,'off') else 0) %}
              {% endfor %}
              {{ i.item == watervalve_switch | list | count }}
        sequence:
          - action: "{{ 'valve.close_valve' if watering_switch.split('.')[0] == 'valve' else 'switch.turn_off' }}"
            target:
              entity_id: !input watering_switch
            data: {}

#######################################################################################
# Ручное включение направления
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - watervalve_switch_on_trigger
          - condition: template
            value_template: |
              {{ (watervalve_switch | count) > 0 }}
        sequence:
          - if:
              - condition: state
                entity_id: !input waterpump_switch
                state: "off"
            then:
              - action: "{{ 'valve.open_valve' if waterpump_switch.split('.')[0] == 'valve' else 'switch.turn_on' }}"
                target:
                  entity_id: !input waterpump_switch
                data: {}
          - repeat:
              for_each: !input watervalve_switch
              sequence:
                - if:
                    - condition: template
                      value_template: |
                        {{ repeat.item != trigger.from_state.entity_id }}
                  then:
                    - action: "{{ 'valve.close_valve' if (repeat.item).split('.')[0] == 'valve' else 'switch.turn_off' }}" #  Выключение клапана потока
                      target:
                        entity_id: "{{ repeat.item }}"
                    - delay:
                        seconds: 1
          - delay: "{{ '%02d:%02d:%02d' | format(set_watervalve_close_delay // 3600, (set_watervalve_close_delay % 3600) // 60, set_watervalve_close_delay % 60) }}"
          - if:
              - condition: state
                entity_id: !input watering_switch
                state: "off"
            then:
              - delay: "{{ '%02d:%02d:%02d' | format(set_watervalve_open_delay // 3600, (set_watervalve_open_delay % 3600) // 60, set_watervalve_open_delay % 60) }}"
              - action: "{{ 'valve.open_valve' if watering_switch.split('.')[0] == 'valve' else 'switch.turn_on' }}"
                target:
                  entity_id: !input watering_switch
                data: {}

#######################################################################################
# Включение насоса и закрытие клапанов направления до включения системы утром
#######################################################################################

      - conditions:
          - condition: trigger
            id: 
              - time_before_morning_trigger
          - condition: template
            value_template: |
              {{ waterpump_switch != [] and states(waterpump_switch) not in invalid_states }}
          - condition: template
            value_template: |
              {{ true if ('every_over_day_morning' not in set_working_day_morning) else ((now().timestamp() / 86400) | int % 2 == 0) }}
          - condition: template
            value_template: |
              {{ true if ('select_morning' not in set_working_day_morning) else selected_days_morning }}
        sequence:
          - target:
              entity_id: !input waterpump_switch
            data: {}
            action: "{{ 'valve.open_valve' if waterpump_switch.split('.')[0] == 'valve' else 'switch.turn_on' }}"
          - delay:
              seconds: 1
          - repeat:
              for_each: !input watervalve_switch
              sequence:
                - action: "{{ 'valve.open_valve' if (repeat.item).split('.')[0] == 'valve' else 'switch.turn_on' }}" #  Выключение клапана потока
                  target:
                    entity_id: "{{ repeat.item }}"
                - delay:
                    seconds: 1
      
#######################################################################################
# Включение насоса и закрытие клапанов направления до включения системы вечером
#######################################################################################

      - conditions:
          - condition: trigger
            id: 
              - time_before_evening_trigger
          - condition: template
            value_template: |
              {{ waterpump_switch != [] and states(waterpump_switch) not in invalid_states }}
          - condition: template
            value_template: |
              {{ true if ('every_over_day_evening' not in set_working_day_evening) else ((now().timestamp() / 86400) | int % 2 == 0) }}
          - condition: template
            value_template: |
              {{ true if ('select_evening' not in set_working_day_evening) else selected_days_evening }}
        sequence:
          - target:
              entity_id: !input waterpump_switch
            data: {}
            action: "{{ 'valve.open_valve' if waterpump_switch.split('.')[0] == 'valve' else 'switch.turn_on' }}"
          - delay:
              seconds: 1
          - repeat:
              for_each: !input watervalve_switch
              sequence:
                - action: "{{ 'valve.open_valve' if (repeat.item).split('.')[0] == 'valve' else 'switch.turn_on' }}" #  Выключение клапана потока
                  target:
                    entity_id: "{{ repeat.item }}"
                - delay:
                    seconds: 1
      
#######################################################################################
# Включение системы утром
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - on_morning_trigger
          - condition: template
            value_template: |
              {{ true if ('every_over_day_morning' not in set_working_day_morning) else ((now().timestamp() / 86400) | int % 2 == 0) }}
          - condition: template
            value_template: |
              {{ true if ('select_morning' not in set_working_day_morning) else selected_days_morning }}
          - condition: template
            value_template: |
              {{ states(waterpump_switch) in open_states }}
        sequence:
          - action: "{{ 'valve.open_valve' if watering_switch.split('.')[0] == 'valve' else 'switch.turn_on' }}" #            Клапан на воду включен
            target: 
              entity_id: !input watering_switch
            data: {}
          - repeat:
              for_each: !input watervalve_switch
              sequence:
                - action: "{{ 'valve.close_valve' if (repeat.item).split('.')[0] == 'valve' else 'switch.turn_off' }}" #  Выключение клапана потока
                  target:
                    entity_id: "{{ repeat.item }}"
                - delay: "{{ '%02d:%02d:%02d' | format(set_watervalve_open_delay // 3600, (set_watervalve_open_delay % 3600) // 60, set_watervalve_open_delay % 60) }}"
                - delay: !input set_time_work_morning
                - action: "{{ 'valve.open_valve' if (repeat.item).split('.')[0] == 'valve' else 'switch.turn_on' }}" #  Выключение клапана потока
                  target:
                    entity_id: "{{ repeat.item }}"
                - delay: "{{ '%02d:%02d:%02d' | format(set_watervalve_close_delay // 3600, (set_watervalve_close_delay % 3600) // 60, set_watervalve_close_delay % 60) }}"
          - data: {} #                                      Клапан на воду выключен
            target:
              entity_id: !input watering_switch
            action: "{{ 'valve.close_valve' if watering_switch.split('.')[0] == 'valve' else 'switch.turn_off' }}"
      
#######################################################################################
# Включение системы вечером
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - on_evening_trigger
          - condition: template
            value_template: |
              {{ true if ('every_over_day_evening' not in set_working_day_evening) else ((now().timestamp() / 86400) | int % 2 == 0) }}
          - condition: template
            value_template: |
              {{ true if ('select_evening' not in set_working_day_evening) else selected_days_evening }}
          - condition: template
            value_template: |
              {{ states(waterpump_switch) in open_states }}
        sequence:
          - action: "{{ 'valve.open_valve' if watering_switch.split('.')[0] == 'valve' else 'switch.turn_on' }}" #            Клапан на воду включен
            target: 
              entity_id: !input watering_switch
            data: {}
          - repeat:
              for_each: !input watervalve_switch
              sequence:
                - action: "{{ 'valve.close_valve' if (repeat.item).split('.')[0] == 'valve' else 'switch.turn_off' }}" #  Выключение клапана потока
                  target:
                    entity_id: "{{ repeat.item }}"
                - delay: "{{ '%02d:%02d:%02d' | format(set_watervalve_open_delay // 3600, (set_watervalve_open_delay % 3600) // 60, set_watervalve_open_delay % 60) }}"
                - delay: !input set_time_work_evening
                - action: "{{ 'valve.open_valve' if (repeat.item).split('.')[0] == 'valve' else 'switch.turn_on' }}" #  Выключение клапана потока
                  target:
                    entity_id: "{{ repeat.item }}"
                - delay: "{{ '%02d:%02d:%02d' | format(set_watervalve_close_delay // 3600, (set_watervalve_close_delay % 3600) // 60, set_watervalve_close_delay % 60) }}"
          - data: {} #                                      Клапан на воду выключен
            target:
              entity_id: !input watering_switch
            action: "{{ 'valve.close_valve' if watering_switch.split('.')[0] == 'valve' else 'switch.turn_off' }}"
       
#######################################################################################
# Аварийное выключение системы
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - pump_off_auto_trigger
        sequence:
          - action: "{{ 'valve.close_valve' if watering_switch.split('.')[0] == 'valve' else 'switch.turn_off' }}"
            target:
              entity_id: !input watering_switch
            data: {}
          - repeat:
              for_each: !input watervalve_switch
              sequence:
                - action: "{{ 'valve.close_valve' if (repeat.item).split('.')[0] == 'valve' else 'switch.turn_off' }}" #  Выключение клапана потока
                  target:
                    entity_id: "{{ repeat.item }}"
                - delay:
                    seconds: 1
          - if:
              - condition: template
                value_template: |
                  {% set i = namespace(item=int(0)) %}
                  {% set items = states.person | rejectattr('state', 'in', ['unavailable', 'unknown', 'none']) | map(attribute='entity_id') | list %}
                  {% for item in items %}
                    {% set zla = state_attr('zone.home', 'latitude') | round(3) %}
                    {% set zlo = state_attr('zone.home', 'longitude') | round(3) %}
                    
                    {% set ila = 0 if state_attr(item, 'latitude') is none else state_attr(item, 'latitude') | round(3) %}
                    {% set ilo = 0 if state_attr(item, 'longitude') is none else state_attr(item, 'longitude') | round(3) %}

                    {% set la = (zla - ila) | abs | round (2) | float < 0.03 %}
                    {% set lo = (zlo - ilo) | abs | round (2) | float < 0.03 %}
                    
                    {% set i.item = i.item + (1 if (la and lo) else 0) %}
                  {% endfor %}
                  {{ i.item == 0 }}
              # {% set allpersons = state_attr('zone.home','persons') | count %}
              # {% set cottagepersons = state_attr('zone.home','persons') | select('search', 'cottage') | list | count %}
              # {% set apartmentpersons = state_attr('zone.home','persons') | select('search', 'apartment') | list | count %}
              # {{ (allpersons - cottagepersons - apartmentpersons) | int == 0 }}
            then:
              - delay: !input set_time_waterpump_work
              - action: "{{ 'valve.close_valve' if waterpump_switch.split('.')[0] == 'valve' else 'switch.turn_off' }}"
                target:
                  entity_id: !input waterpump_switch
                data: {}
      
#######################################################################################
# Выключение таймера для варийного выключение системы
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - watering_toggle_trigger
          - condition: template
            value_template: |
              {{ trigger.from_state.state in open_states and trigger.to_state.state in closed_states }}
        sequence:
          - action: timer.finish
            metadata: {}
            data: {}
            target:
              entity_id: !input pump_off_auto
      
#######################################################################################
# Влючение таймера для варийного выключение системы
#######################################################################################

      - conditions:
          - condition: trigger 
            id:
              - watering_toggle_trigger
          - condition: template
            value_template: |
              {{ trigger.from_state.state in closed_states and trigger.to_state.state in open_states }}
          - condition: state
            entity_id: !input waterpump_switch
            state: "on"
        sequence:
          - action: timer.start
            metadata: {}
            data: # Расчет времени до автоотключение  
              duration: | 
                {% set watervalve_count = watervalve_switch | list | count %}
                {% set on_time_morning_in_seconds = set_time_work_morning.split(':')[0] | int * 3600 + set_time_work_morning.split(':')[1] | int * 60 + set_time_work_morning.split(':')[2] | int %}
                {% set on_time_evening_in_seconds = set_time_work_evening.split(':')[0] | int * 3600 + set_time_work_evening.split(':')[1] | int * 60 + set_time_work_evening.split(':')[2] | int %}
                {% set auto_off_pump_time_in_seconds = set_auto_off_pump_time.split(':')[0] | int * 3600 + set_auto_off_pump_time.split(':')[1] | int * 60 + set_auto_off_pump_time.split(':')[2] | int %}
                {% set max_seconds = max(((set_watervalve_open_delay + on_time_morning_in_seconds + set_watervalve_close_delay) * watervalve_count + 60), ((set_watervalve_open_delay + on_time_evening_in_seconds + set_watervalve_close_delay) * watervalve_count + 60), auto_off_pump_time_in_seconds) %}
                {{ '%02d:%02d:%02d' | format(max_seconds// 3600, (max_seconds % 3600) // 60, max_seconds % 60) }}
            target:
              entity_id: !input pump_off_auto

