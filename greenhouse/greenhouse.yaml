blueprint:
  name: Управление поливом теплицы
  description: |
    ### Управление поливом теплицы.
    <small>Версия 2026.07.01, сборка 8</small>

    <a href="https://raw.githubusercontent.com/S0ft0r/ha-blueprints/main/docs/greenhouse/readme.md">Описание</a>
    <a href="https://raw.githubusercontent.com/S0ft0r/ha-blueprints/main/docs/greenhouse/changelog.md">История изменений</a>

    <small><a href="https://github.com/S0ft0r/ha-blueprints/blob/main/as-is.md">Отказ от ответственности</a></small>
  domain: automation
  source_url: https://raw.githubusercontent.com/S0ft0r/ha-blueprints/main/greenhouse/greenhouse.yaml
  author: Softor

  input:

    ####################################################################
    # Базовые обязательные параметры 
    ####################################################################

    watering_switch:
      name: Реле/клапан включения полива
      description: |
        Реле/клапан включения полива
        <small>* Поддерживается домены switch и valve</small>
      selector:
        entity:
          filter:
            - domain:
                - switch
                - valve
          reorder: false
          multiple: false

    pump_off_auto:
      name: Таймер автоматического отключения
      description: |
        <strong>Обязательный параметр</strong> - вспомогательный элемент [timer](https://my.home-assistant.io/redirect/helpers/)
        <small>* для отсчета автоматического отключения электромагнитного клапана / защита от перегрева (перелива)</small>
      selector:
        entity:
          filter:
            - domain:
                - timer
          reorder: false
          multiple: false

    ####################################################################
    # Секция: Клапаны направления
    ####################################################################

    valves_section:
      name: Клапаны направления
      description: |
        Настройка клапанов направлений полива, их типа и задержек срабатывания.
      icon: mdi:pipe-valve
      input:

        watervalve_switch:
          name: Клапаны направления
          description: ""
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
                    - valve
              reorder: false
              multiple: true

        set_nc_no_type_valve:
          name: Тип клапанов направления
          default: type_no
          selector:
            select:
              options:
                - label: Нормально-открытый
                  value: type_no
                - label: Нормально-закрытый
                  value: type_nc
              mode: dropdown

        set_watervalve_open_delay:
          name: Задержка открытия клапана направления
          description: Время ожидания полного открытия клапана направления
          default: 5
          selector:
            number:
              min: 1
              max: 300
              mode: slider
              unit_of_measurement: "сек"

        set_watervalve_close_delay:
          name: Задержка закрытия клапана направления
          description: Время ожидания полного закрытия клапана направления
          default: 5
          selector:
            number:
              min: 1
              max: 300
              mode: slider
              unit_of_measurement: "сек"

    ####################################################################
    # Секция: Утро 
    ####################################################################

    morning_section:
      name: Настройки системы для работы утром
      description: |
        Устанавливается время включения, режим работы полива.
      icon: mdi:clock-time-four-outline
      input:
        set_pump_morning_enable:
          name: Включение полива утром
          default:
            active_choice: выбор
            выбор: false
            сенсор: []
          selector:
            choose:
              choices:
                "выбор":
                  selector:
                    boolean: {}
                "сенсор":
                  selector:
                    entity:
                      filter:
                        - domain:
                            - input_boolean
                      multiple: false
        set_on_time_morning:
          name: Включить утром в
          default: 
            время: "08:00:00"
            active_choice: время
            сенсор: [] 
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain:
                            - input_datetime
                      multiple: false

        set_time_work_morning:
          name: Включать на
          description: |
            Время, на которое включается полив 
            <small>* На каждое направление</small>
          default: 
            время: "00:10:00"
            active_choice: время
            сенсор: [] 
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain:
                            - input_datetime
                      multiple: false

        set_working_day_morning:
          name: Режим работы полива
          default: every_day_morning
          selector:
            select:
              options:
                - label: Ежедневно
                  value: every_day_morning
                - label: Через день
                  value: every_over_day_morning
                - label: Выбор дней
                  value: select_morning
              mode: list
              multiple: false

        set_select_days_morning:
          name: Выбор дней
          description: |
            Включение полива по дням
            <small>* Работает при включенном режим работы <em>Выбор дней</em></small>
          default: []
          selector:
            select:
              options:
                - label: Понедельник
                  value: mon
                - label: Вторник
                  value: tue
                - label: Среда
                  value: wed
                - label: Четверг
                  value: thu
                - label: Пятница
                  value: fri
                - label: Суббота
                  value: sat
                - label: Воскресенье
                  value: sun
              sort: false
              multiple: true
              custom_value: false
              mode: list

        morning_watervalve_switch:
          name: Клапаны направления, используемые только утром
          description: Если ничего не выбрано, то используются все клапана
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
                    - valve
              reorder: false
              multiple: true

    ####################################################################
    # Секция: Вечер 
    ####################################################################

    evening_section:
      name: Настройки системы для работы вечером
      description: |
        Устанавливается время включения, режим работы системы полива.
      icon: mdi:clock-time-eight-outline
      input:
        set_pump_evening_enable:
          name: Включение вечером
          default:
            active_choice: выбор
            выбор: false
            сенсор: []
          selector:
            choose:
              choices:
                "выбор":
                  selector:
                    boolean: {}
                "сенсор":
                  selector:
                    entity:
                      filter:
                        - domain:
                            - input_boolean
                      multiple: false

        set_on_time_evening:
          name: Включить вечером в
          default: 
            время: "20:00:00"
            active_choice: время
            сенсор: [] 
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain:
                            - input_datetime
                      multiple: false

        set_time_work_evening:
          name: Включать на
          description: |
            Время, на которое включается полив 
            <small>* На каждое направление</small>
          default: 
            время: "00:10:00"
            active_choice: время
            сенсор: [] 
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain:
                            - input_datetime
                      multiple: false

        set_working_day_evening:
          name: Режим включения вечером
          description: |
            Выбор режима включения полива в вечернее время
          default: every_day_evening
          selector:
            select:
              options:
                - label: Ежедневно
                  value: every_day_evening
                - label: Через день
                  value: every_over_day_evening
                - label: Выбор дней
                  value: select_evening
              mode: list
              multiple: false

        set_select_days_evening:
          name: Выбор дней
          description: |
            Включение полива по дням
            <small>* Работает при включенном режим работы <em>Выбор дней</em></small>
          default: []
          selector:
            select:
              options:
                - label: Понедельник
                  value: mon
                - label: Вторник
                  value: tue
                - label: Среда
                  value: wed
                - label: Четверг
                  value: thu
                - label: Пятница
                  value: fri
                - label: Суббота
                  value: sat
                - label: Воскресенье
                  value: sun
              sort: false
              multiple: true
              custom_value: false
              mode: list

        evening_watervalve_switch:
          name: Клапаны направления, используемые только вечером
          description: Если ничего не выбрано, то используются все клапана
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
                    - valve
              reorder: false
              multiple: true

    ####################################################################
    # Секция: Насос (второстепенная)
    ####################################################################

    pump_section:
      name: Насос
      description: |
        Настройки реле насоса и его поведения относительно присутствия людей дома.
      icon: mdi:water-pump
      collapsed: true
      input:
      
        waterpump_switch:
          name: Реле насоса
          description: ""
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
                    - valve
              reorder: false
              multiple: false

        set_time_waterpump_work:
          name: Включать насос на
          description: |
            Время, на которое включается насос перед и после полива
            <small>* При отсутствии людей в доме</small>
          default:
            время: "00:01:00"
            active_choice: время
            сенсор: []
          selector:
            choose:
              choices:
                'время':
                  selector:
                    time: {}
                'сенсор':
                  selector:
                    entity:
                      filter:
                        - domain:
                            - input_datetime
                      multiple: false

        set_person_check:
          name: Учитывать присутствие людей дома
          description: При выключенной опции насос будет отключен принудительно после завершения работы системы полива
          default: true
          selector:
            boolean: {}

    ####################################################################
    # Секция: Влажность почвы (второстепенно)
    ####################################################################

    soil_moisture_section:
      name: Влажность почвы
      description: |
        Настройки учета влажности почвы по отдельным направлениям полива.

        Если датчик есть не у каждого направления, выберите только те клапаны,
        для которых датчики действительно установлены.

        <strong>Порядок важен:</strong>
        первый клапан из списка соответствует первому датчику,
        второй клапан — второму датчику и так далее.
      icon: mdi:water-percent
      collapsed: true
      input:

        set_use_soil_moisture:
          name: Учитывать влажность почвы
          default: false
          selector:
            boolean: {}

        soil_moisture_valves:
          name: Клапаны направлений с датчиками влажности
          description: |
            Выберите только те направления, у которых есть датчик влажности почвы.
            Порядок должен соответствовать списку датчиков ниже.
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
                    - valve
              reorder: true
              multiple: true

        soil_moisture_sensors:
          name: Датчики влажности почвы
          description: |
            Выберите датчики влажности в том же порядке, что и клапаны выше.

            Пример:
            1-й клапан → 1-й датчик,
            2-й клапан → 2-й датчик.
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - sensor
                  device_class: moisture
              reorder: true
              multiple: true

        set_soil_block_schedule_enable:
          name: Пропускать влажные направления
          description: |
            Если включено, направление будет пропущено,
            когда влажность почвы выше заданного порога.
          default: true
          selector:
            boolean: {}

        set_soil_skip_threshold:
          name: Не поливать направление, если влажность выше
          default: 65
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"

        set_soil_watering_enable:
          name: Внеплановый полив при низкой влажности
          description: |
            Если влажность почвы опускается ниже заданного порога,
            будет запущен внеплановый полив соответствующего направления,
            даже вне расписания.
          default:
            active_choice: выбор
            выбор: false
            сенсор: []
          selector:
            choose:
              choices:
                "выбор":
                  selector:
                    boolean: {}
                "сенсор":
                  selector:
                    entity:
                      filter:
                        - domain:
                            - input_boolean
                      multiple: false

        set_soil_watering_low_threshold:
          name: Порог низкой влажности
          description: |
            Если влажность почвы ниже этого значения — будет запущен
            внеплановый полив соответствующего направления.
          default: 30
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"

        set_soil_watering_for:
          name: Время подтверждения низкой влажности
          description: |
            Влажность должна оставаться ниже порога это время подряд,
            прежде чем будет запущен внеплановый полив.
            <small>* Защита от ложных срабатываний из-за кратковременных скачков показаний</small>
          default: "00:15:00"
          selector:
            time: {}

        set_soil_watering_duration:
          name: Длительность внепланового полива
          description: Время работы направления при внеплановом поливе
          default: "00:05:00"
          selector:
            time: {}

        set_soil_diag_enable:
          name: Диагностика датчиков влажности
          description: |
            После каждого полива система проверит, изменились ли показания датчика.
            Если влажность не выросла — будет отправлено предупреждение.
            <small>* Диагностика выполняется асинхронно и не увеличивает длительность цикла полива</small>
          default: false
          selector:
            boolean: {}

        set_soil_diag_delay:
          name: Задержка проверки после полива
          description: |
            Время ожидания после закрытия клапана направления
            перед проверкой показаний датчика.
            <small>* Вода должна успеть дойти до зоны датчика</small>
          default: "00:05:00"
          selector:
            time: {}

        set_soil_diag_min_delta:
          name: Минимальный прирост влажности
          description: |
            Если влажность после полива выросла менее чем на это значение,
            система сообщит о проблеме.
          default: 3
          selector:
            number:
              min: 1
              max: 30
              step: 1
              mode: slider
              unit_of_measurement: "%"

        set_soil_night_block_enable:
          name: Запрет внепланового полива в ночное время
          description: |
            Если включено, внеплановый полив по датчику влажности
            не будет запускаться в заданный ночной период.
          default: true
          selector:
            boolean: {}

        set_soil_night_start:
          name: Начало ночного периода
          description: |
            После этого времени внеплановый полив запрещён.
          default: "22:00:00"
          selector:
            time: {}

        set_soil_night_end:
          name: Окончание ночного периода
          description: |
            После этого времени внеплановый полив снова разрешён.
          default: "06:00:00"
          selector:
            time: {}

    ####################################################################
    # Секция: Прогноз погоды (второстепенная)
    ####################################################################

    forecast_section:
      name: Прогноз погоды
      description: |
        Настройки учета прогноза погоды для отмены полива.
      icon: mdi:weather-partly-rainy
      collapsed: true
      input:

        set_use_forecast_enable:
          name: Учитывать прогноз погоды для включения полива
          default:
            active_choice: выбор
            выбор: false
            сенсор: []
          selector:
            choose:
              choices:
                "выбор":
                  selector:
                    boolean: {}
                "сенсор":
                  selector:
                    entity:
                      filter:
                        - domain:
                            - input_boolean
                      multiple: false

        forecast_sensor:
          name: Прогнозный сенсор
          description: |
            Сенсор, определяющий прогноз погоды.
             + <small>Параметр обязателен только при выборе параметра <em>"Учитывать прогноз погоды"</em>. Если ничего не выбрано, то дополнительный параметр учитываться не будет.</small>
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - weather
              multiple: false

        set_rain_conditions:
          name: Прогноз погоды
          description: |
            Прогноз погоды, при котором полив включаться не будет
          default:
            - rainy
            - pouring
            - lightning-rainy
          selector:
            select:
              options:
                - label: Дождь
                  value: rainy
                - label: Проливной дождь
                  value: pouring
                - label: Гроза
                  value: lightning-rainy
                - label: Переменная облачность
                  value: partlycloudy
                - label: Облачно
                  value: cloudy
                - label: Туман
                  value: fog
              sort: false
              multiple: true
              custom_value: false
              mode: list

        set_rain_number_forecast_hours:
          name: Количество часов
          description: Прогноз погоды на определенное количество часов
          default: 3
          selector:
            number:
              min: 1
              max: 24
              mode: slider
              step: 1
              unit_of_measurement: "час"   

    ####################################################################
    # Секция: Адаптация полива по температуре (второстепенная)
    ####################################################################

    weather_adapt_section:
      name: Адаптация полива по температуре
      description: |
        Автоматическая корректировка длительности полива
        в зависимости от температуры воздуха.

        Базовое время полива умножается на коэффициент:
        - ниже «холодной» границы — полив не запускается
        - между «холодной» и «комфортной» — сокращённый полив
        - между «комфортной» и «жаркой» — базовое время 
        - выше «жаркой» границы — увеличенный полив
      icon: mdi:thermometer-water
      collapsed: true
      input:

        set_weather_adapt_enable:
          name: Адаптировать время полива по температуре
          default: false
          selector:
            boolean: {}

        weather_temp_sensor:
          name: Датчик температуры воздуха
          description: |
            Датчик температуры для расчёта коэффициента.
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - sensor
                  device_class: temperature
              multiple: false

        set_temp_cold:
          name: Холодная граница
          description: |
            Ниже этой температуры полив не запускается
          default: 5
          selector:
            number:
              min: -10
              max: 30
              step: 1
              mode: slider
              unit_of_measurement: "°C"

        set_temp_comfort:
          name: Комфортная граница
          description: |
            Между холодной и комфортной границей —
            время полива сокращается пропорционально
          default: 18
          selector:
            number:
              min: 0
              max: 35
              step: 1
              mode: slider
              unit_of_measurement: "°C"

        set_temp_hot:
          name: Жаркая граница
          description: |
            Выше этой температуры время полива увеличивается
          default: 30
          selector:
            number:
              min: 15
              max: 50
              step: 1
              mode: slider
              unit_of_measurement: "°C"

        set_cold_multiplier:
          name: Коэффициент при прохладе
          description: |
            Минимальный множитель (на холодной границе).
            Между холодной и комфортной — плавная интерполяция.
          default: 0.5
          selector:
            number:
              min: 0.1
              max: 1.0
              step: 0.1
              mode: slider

        set_hot_multiplier:
          name: Коэффициент при жаре
          description: |
            Множитель при достижении жаркой границы.
            Выше — не растёт (потолок).
          default: 1.5
          selector:
            number:
              min: 1.0
              max: 3.0
              step: 0.1
              mode: slider

    ####################################################################
    # Секция: Безопасность и задержки главного клапана (второстепенная)
    ####################################################################

    safety_section:
      name: Безопасность и задержки клапана полива
      description: |
        Настройки задержек главного клапана и аварийного автоотключения.
      icon: mdi:shield-alert-outline
      collapsed: true
      input:

        set_check_devices_enable:
          name: Проверять доступность устройств перед поливом
          default: true
          selector:
            boolean: {}

        set_stale_time:
          name: Время "протухания"
          description: Время, после которого счтиается, что сенсор (персона, прогноз погоды и т.п.) завис - например при отсутствии связи с интернетом.
          default: "02:00:00"
          selector:
            time: {}

        set_watering_open_delay:
          name: Задержка открытия клапана на воду
          description: Время ожидания полного открытия клапана направления
          default: 5
          selector:
            number:
              min: 1
              max: 300
              mode: slider
              unit_of_measurement: "сек"

        set_watering_close_delay:
          name: Задержка закрытия клапана на воду
          description: Время ожидания полного закрытия клапана направления
          default: 5
          selector:
            number:
              min: 1
              max: 300
              mode: slider
              unit_of_measurement: "сек"

        set_auto_off_pump_time:
          name: Время работы до автоотключения
          description: |
            * Минимальное время. Если сумма времени работы каждого направления больше, то будет произведен пересчет.
          default: "00:30:00"
          selector:
            time: {}
            
    ####################################################################
    # Секция: Логирование ошибок
    ####################################################################

    logging_section:
      name: Логирование ошибок
      description: |
        Запись в Ленту событий (Logbook) и уведомление при ошибках работы главного клапана полива.
      icon: mdi:alert-circle-outline
      collapsed: true
      input:

        set_logging_enable:
          name: Логировать ошибки
          description: Включает запись в Logbook и отправку уведомления при сбоях главного клапана
          default: false
          selector:
            boolean: {}

        notify_target:
          name: Получатель уведомлений
          description: |
            Сущность notify (например, notify.mobile_app_iphone), на которую будет отправлено уведомление об ошибке.
            <small>* Если не выбрано — уведомление отправляться не будет, запись в Logbook продолжит работать</small>
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - notify
              multiple: true

trigger_variables:
  watering_switch: !input watering_switch
  watervalve_switch: !input watervalve_switch
  morning_watervalve_switch: !input morning_watervalve_switch
  evening_watervalve_switch: !input evening_watervalve_switch
  waterpump_switch: !input waterpump_switch
  pump_off_auto: !input pump_off_auto
  forecast_sensor: !input forecast_sensor

  set_pump_morning_enable: !input set_pump_morning_enable
  set_pump_evening_enable: !input set_pump_evening_enable

  set_on_time_morning: !input set_on_time_morning
  set_on_time_evening: !input set_on_time_evening

  set_time_work_morning: !input set_time_work_morning
  set_time_work_evening: !input set_time_work_evening
  set_time_waterpump_work: !input set_time_waterpump_work

  set_working_day_morning: !input set_working_day_morning
  set_working_day_evening: !input set_working_day_evening
  set_select_days_morning: !input set_select_days_morning
  set_select_days_evening: !input set_select_days_evening

  set_auto_off_pump_time: !input set_auto_off_pump_time

  set_watering_open_delay: !input set_watering_open_delay
  set_watering_close_delay: !input set_watering_close_delay

  set_watervalve_open_delay: !input set_watervalve_open_delay
  set_watervalve_close_delay: !input set_watervalve_close_delay
  set_nc_no_type_valve: !input set_nc_no_type_valve

  set_rain_conditions: !input set_rain_conditions
  set_use_forecast_enable: !input set_use_forecast_enable
  set_rain_number_forecast_hours: !input set_rain_number_forecast_hours

  set_person_check: !input set_person_check
  
  set_check_devices_enable: !input set_check_devices_enable
  set_stale_time: !input set_stale_time

  set_logging_enable: !input set_logging_enable
  notify_target: !input notify_target

  set_use_soil_moisture: !input set_use_soil_moisture
  soil_moisture_valves: !input soil_moisture_valves
  soil_moisture_sensors: !input soil_moisture_sensors
  set_soil_block_schedule_enable: !input set_soil_block_schedule_enable
  set_soil_skip_threshold: !input set_soil_skip_threshold
  set_soil_watering_enable: !input set_soil_watering_enable
  set_soil_watering_low_threshold: !input set_soil_watering_low_threshold
  set_soil_watering_for: !input set_soil_watering_for
  set_soil_watering_duration: !input set_soil_watering_duration
  set_soil_diag_enable: !input set_soil_diag_enable
  set_soil_diag_delay: !input set_soil_diag_delay
  set_soil_diag_min_delta: !input set_soil_diag_min_delta
  set_soil_night_block_enable: !input set_soil_night_block_enable
  set_soil_night_start: !input set_soil_night_start
  set_soil_night_end: !input set_soil_night_end  

  set_weather_adapt_enable: !input set_weather_adapt_enable
  weather_temp_sensor: !input weather_temp_sensor
  set_temp_cold: !input set_temp_cold
  set_temp_comfort: !input set_temp_comfort
  set_temp_hot: !input set_temp_hot
  set_cold_multiplier: !input set_cold_multiplier
  set_hot_multiplier: !input set_hot_multiplier

  is_soil_moisture_defined: "{{ soil_moisture_valves != [] and soil_moisture_sensors != [] }}"
  is_watervalve_defined: "{{ watervalve_switch != [] }}"
  is_waterpump_defined: "{{ waterpump_switch != [] }}"

  open_states:
    - "on"
    - "open"
    - "true"

  closed_states:
    - "off"
    - "closed"
    - "false"

  invalid_states:
    - ""
    - "unavailable"
    - "unknown"
    - "none"

variables:
  # Выбранные дни работы полива
  selected_days_morning: "{{ now().strftime('%a') | lower in set_select_days_morning }}"
  selected_days_evening: "{{ now().strftime('%a') | lower in set_select_days_evening }}"

  # Определение времени работы насоса
  time_waterpump_work: "{{ set_time_waterpump_work.время if set_time_waterpump_work.active_choice == 'время' else states(set_time_waterpump_work.сенсор) }}"

  # Определение времени работы системы полива на каждое направление
  time_work_morning: "{{ set_time_work_morning.время if set_time_work_morning.active_choice == 'время' else states(set_time_work_morning.сенсор) }}"
  time_work_evening: "{{ set_time_work_evening.время if set_time_work_evening.active_choice == 'время' else states(set_time_work_evening.сенсор) }}"

  # Задержки открытия клапана на воду
  watering_close_delay: "{{ '%02d:%02d:%02d' | format(set_watering_close_delay | int // 3600, (set_watering_close_delay | int % 3600) // 60, set_watering_close_delay | int % 60) }}"
  watering_open_delay: "{{ '%02d:%02d:%02d' | format(set_watering_open_delay | int // 3600, (set_watering_open_delay | int % 3600) // 60, set_watering_open_delay | int % 60) }}"

  # Задержки открытия клапанов направления
  watervalve_close_delay: "{{ '%02d:%02d:%02d' | format(set_watervalve_close_delay | int // 3600, (set_watervalve_close_delay | int % 3600) // 60, set_watervalve_close_delay | int % 60) }}"
  watervalve_open_delay: "{{ '%02d:%02d:%02d' | format(set_watervalve_open_delay | int // 3600, (set_watervalve_open_delay | int % 3600) // 60, set_watervalve_open_delay | int % 60) }}"

  # Действия на открытие/закрытие насоса
  waterpump_open_action: "{{ 'valve.open_valve' if waterpump_switch.split('.')[0] == 'valve' else 'homeassistant.turn_on' }}"
  waterpump_close_action: "{{ 'valve.close_valve' if waterpump_switch.split('.')[0] == 'valve' else 'homeassistant.turn_off' }}"

  # Действия на открытие/закрытие клапана на воду
  watering_open_action: "{{ 'valve.open_valve' if watering_switch.split('.')[0] == 'valve' else 'homeassistant.turn_on' }}"
  watering_close_action: "{{ 'valve.close_valve' if watering_switch.split('.')[0] == 'valve' else 'homeassistant.turn_off' }}"

  # Тип клапанов направления - НО/НЗ
  no_type_valve: "{{ set_nc_no_type_valve == 'type_no' }}"

  # Определение действия в соответствии с типом клапана направления
  action_valve_open: "{{ 'open_valve' if set_nc_no_type_valve == 'type_no' else 'close_valve' }}"
  action_valve_close: "{{ 'close_valve' if set_nc_no_type_valve == 'type_no' else 'open_valve' }}"
  action_switch_on: "{{ 'turn_on' if set_nc_no_type_valve == 'type_no' else 'turn_off' }}"
  action_switch_off: "{{ 'turn_off' if set_nc_no_type_valve == 'type_no' else 'turn_on' }}"

  stale_seconds: |
    {{ set_stale_time.split(':')[0] | int * 3600 + set_stale_time.split(':')[1] | int * 60 + set_stale_time.split(':')[2] | int }}

  use_forecast_enable: "{{ set_use_forecast_enable.выбор if set_use_forecast_enable.active_choice == 'выбор' else states(set_use_forecast_enable.сенсор) in open_states }}"
  soil_watering_enable: >
    {{
      set_soil_watering_enable.выбор | bool(false)
      if set_soil_watering_enable.active_choice == 'выбор'
      else is_state(set_soil_watering_enable.сенсор, 'on')
    }}

  weather_multiplier: >
    {% if not set_weather_adapt_enable or weather_temp_sensor == [] %}
      {{ 1.0 }}
    {% else %}
      {% set temp = states(weather_temp_sensor) | float(default=-999) %}
      {% if temp <= -999 %}
        {{ 1.0 }}
      {% elif temp < set_temp_cold | float %}
        {{ 0.0 }}
      {% elif temp < set_temp_comfort | float %}
        {% set range = (set_temp_comfort | float) - (set_temp_cold | float) %}
        {% set position = temp - (set_temp_cold | float) %}
        {% if range > 0 %}
          {{ ((set_cold_multiplier | float) + (1.0 - (set_cold_multiplier | float)) * (position / range)) | round(2) }}
        {% else %}
          {{ 1.0 }}
        {% endif %}
      {% elif temp < set_temp_hot | float %}
        {{ 1.0 }}
      {% else %}
        {{ set_hot_multiplier | float }}
      {% endif %}
    {% endif %}

  adjusted_time_work_morning: >
    {% set parts = time_work_morning.split(':') %}
    {% set base_seconds = parts[0] | int * 3600 + parts[1] | int * 60 + parts[2] | int %}
    {% set adjusted = (base_seconds * (weather_multiplier | float)) | int %}
    {{ '%02d:%02d:%02d' | format(adjusted // 3600, (adjusted % 3600) // 60, adjusted % 60) }}

  adjusted_time_work_evening: >
    {% set parts = time_work_evening.split(':') %}
    {% set base_seconds = parts[0] | int * 3600 + parts[1] | int * 60 + parts[2] | int %}
    {% set adjusted = (base_seconds * (weather_multiplier | float)) | int %}
    {{ '%02d:%02d:%02d' | format(adjusted // 3600, (adjusted % 3600) // 60, adjusted % 60) }}

  is_night_time: >
    {% if not set_soil_night_block_enable %}
      {{ false }}
    {% else %}
      {% set now_t = now().strftime('%H:%M:%S') %}
      {% set start = set_soil_night_start %}
      {% set end = set_soil_night_end %}
      {% if start > end %}
        {{ now_t >= start or now_t < end }}
      {% else %}
        {{ now_t >= start and now_t < end }}
      {% endif %}
    {% endif %}

  forecast_stale: |
    {% set sensor = expand(forecast_sensor) | first | default(none) %}
    {{ sensor is none or sensor.state in invalid_states or (now() - sensor.last_updated).total_seconds() > (stale_seconds | int(7200)) }}

  unavailable_devices: >
    {% set ns = namespace(items=[]) %}
    {% if states(watering_switch) in invalid_states %}
      {% set ns.items = ns.items + [watering_switch] %}
    {% endif %}
    {% if is_waterpump_defined and states(waterpump_switch) in invalid_states %}
      {% set ns.items = ns.items + [waterpump_switch] %}
    {% endif %}
    {% for valve in watervalve_switch | list %}
      {% if states(valve) in invalid_states %}
        {% set ns.items = ns.items + [valve] %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}

  any_device_unavailable: >
    {{ unavailable_devices | length > 0 }}

triggers:
  - trigger: state # Ручное переключение направления
    entity_id: !input watervalve_switch
    id: watervalve_toggle_trigger
    enabled: "{{ is_watervalve_defined }}"

  - trigger: template # Включение насоса и закрытие клапанов направления до включения системы утром
    value_template: >-
      {% set on_time_morning = set_on_time_morning.время if set_on_time_morning.active_choice == 'время' else states(set_on_time_morning.сенсор) %}
      {% set time_waterpump_work = set_time_waterpump_work.время if set_time_waterpump_work.active_choice == 'время' else states(set_time_waterpump_work.сенсор) %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == as_timestamp(today_at(on_time_morning) - time_waterpump_work | as_timedelta) | timestamp_custom('%H:%M') }}
    id: time_before_morning_trigger

  - trigger: template # Включение насоса и закрытие клапанов направления до включения системы вечером
    value_template: >-
      {% set on_time_evening = set_on_time_evening.время if set_on_time_evening.active_choice == 'время' else states(set_on_time_evening.сенсор) %}
      {% set time_waterpump_work = set_time_waterpump_work.время if set_time_waterpump_work.active_choice == 'время' else states(set_time_waterpump_work.сенсор) %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == as_timestamp(today_at(on_time_evening) - time_waterpump_work | as_timedelta) | timestamp_custom('%H:%M') }}
    id: time_before_evening_trigger

  - trigger: template # Включение системы утром
    value_template: >-
      {% set on_time_morning = set_on_time_morning.время if set_on_time_morning.active_choice == 'время' else states(set_on_time_morning.сенсор) %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == as_timestamp(today_at(on_time_morning)) | timestamp_custom('%H:%M') }}
    id: on_morning_trigger

  - trigger: template # Включение системы вечером
    value_template: >-
      {% set on_time_evening = set_on_time_evening.время if set_on_time_evening.active_choice == 'время' else states(set_on_time_evening.сенсор) %}
      {{ as_timestamp(now()) | timestamp_custom("%H:%M") == as_timestamp(today_at(on_time_evening)) | timestamp_custom('%H:%M') }}
    id: on_evening_trigger

  - entity_id: !input pump_off_auto # Завершение работы по таймеру
    from: active
    to: idle
    trigger: state
    id: pump_off_auto_trigger

  - entity_id: !input watering_switch # Включение таймера для аварийного выключения системы
    trigger: state
    id: watering_toggle_trigger

  - entity_id: !input waterpump_switch
    trigger: state
    id: pump_off_trigger

  - trigger: numeric_state # Низкая влажность почвы — внеплановый полив
    entity_id: !input soil_moisture_sensors
    below: !input set_soil_watering_low_threshold
    for: !input set_soil_watering_for
    id: soil_moisture_low_trigger
    enabled: "{{ is_soil_moisture_defined }}"

  - trigger: event # Асинхронная проверка состояния датчика почвы на зависания
    event_type: my_greenhouse_soil_diag_check_event
    id: soil_diag_check_trigger

actions:
  - if:
      - condition: template
        value_template: |
          {{ not forecast_stale and use_forecast_enable }}
    then:
      - action: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: "{{ forecast_sensor }}"
        response_variable: hourly
        continue_on_error: true

  - variables:
      #######################################################################################
      # Расчет расстояния по координатам вместо is_state('home')
      # для корректной работы с мульти-инстанс системами и несколькими домами
      #######################################################################################

      person_not_in_home: |
        {% set i = namespace(item=int(0)) %}
        {% set items = states.person | rejectattr('state', 'in', ['unavailable', 'unknown', 'none']) | map(attribute='entity_id') | list %}
        {% set zla = 0 if state_attr('zone.home', 'latitude') is none else state_attr('zone.home', 'latitude') | round(3) %}
        {% set zlo = 0 if state_attr('zone.home', 'longitude') is none else state_attr('zone.home', 'longitude') | round(3) %}
        {% for item in items %}
          {% if (now() - states[item].last_updated).total_seconds() < (stale_seconds | int(7200)) %}
            {% set ila = 0 if state_attr(item, 'latitude') is none else state_attr(item, 'latitude') | round(3) %}
            {% set ilo = 0 if state_attr(item, 'longitude') is none else state_attr(item, 'longitude') | round(3) %}
            {% set la = (zla - ila) | abs | round(3) | float < 0.003 %} {# ~ 300 метров #}
            {% set lo = (zlo - ilo) | abs | round(3) | float < 0.003 %} {# ~ 190 метров #}
            {% set i.item = i.item + (1 if (la and lo) else 0) %}
          {% endif %}
        {% endfor %}
        {{ true if not set_person_check else i.item == 0 }}

      #######################################################################################
      # Проверка дождя по прогнозу
      #######################################################################################

      no_rain_next_hours: |
        {% if forecast_sensor != [] 
          and states(forecast_sensor) not in invalid_states 
          and not forecast_stale 
          and use_forecast_enable 
          and hourly is defined 
          and hourly.get(forecast_sensor) is not none %}
            {% set hours = set_rain_number_forecast_hours | int %}
            {% set forecasts = hourly[forecast_sensor].forecast[:hours] | map(attribute='condition') | list %}
            {{ intersect(forecasts, set_rain_conditions) | count == 0 }}
        {% else %}
          {{ true }}
        {% endif %}

      #######################################################################################
      # Включать ли полив утром
      #######################################################################################

      watering_morning_enable: |
        {% set from_sensor = (states(set_pump_morning_enable.сенсор) in open_states) | bool(default=false) if set_pump_morning_enable.active_choice == 'сенсор' else true %}
        {% set from_choice = set_pump_morning_enable.выбор | bool(default=false) if set_pump_morning_enable.active_choice == 'выбор' else true %}
        {{ from_sensor and from_choice }}

      #######################################################################################
      # Включать ли полив вечером
      #######################################################################################

      watering_evening_enable: |
        {% set from_sensor = (states(set_pump_evening_enable.сенсор) in open_states) | bool(default=false) if set_pump_evening_enable.active_choice == 'сенсор' else true %}
        {% set from_choice = set_pump_evening_enable.выбор | bool(default=false) if set_pump_evening_enable.active_choice == 'выбор' else true %}
        {{ from_sensor and from_choice }}

      #######################################################################################
      # Сообщения об ошибках
      #######################################################################################

      log_error: &log_error
        sequence:
          - if:
              - condition: template
                value_template: "{{ set_logging_enable }}"
            then:
              - action: logbook.log
                data:
                  name: "Полив теплицы"
                  message: "{{ log_message }}"
                  entity_id: "{{ log_entity_id | default('') }}"
              - if:
                  - condition: template
                    value_template: "{{ notify_target != [] }}"
                then:
                  - action: notify.send_message
                    target:
                      entity_id: !input notify_target
                    data:
                      title: "Полив теплицы: {{ notification_title | default('Проблема') }}"
                      message: "{{ log_message }}"
                    continue_on_error: true

      #######################################################################################
      # Закрыть главный клапан
      #######################################################################################

      close_watering: &close_watering
        sequence:
          - action: "{{ watering_close_action }}"
            target:
              entity_id: !input watering_switch
          - delay: "{{ watering_close_delay }}"

      #######################################################################################
      # Выключить насос
      #######################################################################################

      waterpump_off: &waterpump_off
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_waterpump_defined }}"
            then:
              - action: "{{ waterpump_close_action }}"
                target:
                  entity_id: !input waterpump_switch

      #######################################################################################
      # Открыть главный клапан
      #######################################################################################

      open_watering: &open_watering
        sequence:
          - action: "{{ watering_open_action }}"
            target:
              entity_id: !input watering_switch
          - delay: "{{ watering_open_delay }}"

      #######################################################################################
      # Включить насос
      #######################################################################################

      waterpump_on: &waterpump_on
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_waterpump_defined }}"
            then:
              - action: "{{ waterpump_open_action }}"
                target:
                  entity_id: !input waterpump_switch

      #######################################################################################
      # Действия клапанов направления
      #######################################################################################

      watervalve_action: &watervalve_action
        sequence:
          - variables:
              current_valve: "{{ repeat.item }}"

              current_soil_sensor: |
                {% set ns = namespace(idx=-1) %}
                {% for valve in soil_moisture_valves | list %}
                  {% if valve == repeat.item and ns.idx == -1 %}
                    {% set ns.idx = loop.index0 %}
                  {% endif %}
                {% endfor %}
                {% if ns.idx >= 0 and (soil_moisture_sensors | count) > ns.idx %}
                  {{ soil_moisture_sensors[ns.idx] }}
                {% else %}
                  {{ '' }}
                {% endif %}

              current_soil_valid: |
                {{
                  current_soil_sensor != ''
                  and states(current_soil_sensor) not in invalid_states
                }}

              current_soil_value: |
                {% if current_soil_sensor != '' and states(current_soil_sensor) not in invalid_states %}
                  {{ states(current_soil_sensor) | float(default=-1) }}
                {% else %}
                  {{ -1 }}
                {% endif %}

              current_soil_blocked: |
                {{
                  set_use_soil_moisture
                  and set_soil_block_schedule_enable
                  and current_soil_valid
                  and (current_soil_value | float) >= (set_soil_skip_threshold | float)
                }}

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ current_soil_blocked }}"
                sequence:
                  - variables:
                      log_message: >-
                        Внимание: направление {{ current_valve }} пропущено из-за высокой влажности почвы.
                        Датчик: {{ current_soil_sensor }}.
                        Влажность: {{ current_soil_value }}%.
                        Порог запрета: {{ set_soil_skip_threshold }}%.
                      log_entity_id: "{{ current_soil_sensor }}"
                      notification_title: "Полив направления отменен"
                  - *log_error

            default:
              - variables:
                  soil_before: >
                    {% if set_soil_diag_enable and current_soil_valid %}
                      {{ states(current_soil_sensor) | float(default=-1) }}
                    {% else %}
                      {{ -1 }}
                    {% endif %}
              - action: "{{ 'valve.' ~ action_valve_close if current_valve.split('.')[0] == 'valve' else 'homeassistant.' ~ action_switch_off }}"
                target:
                  entity_id: "{{ current_valve }}"
              - delay: "{{ watervalve_open_delay }}"
              - delay: "{{ time_work_current }}"
              - action: "{{ 'valve.' ~ action_valve_open if current_valve.split('.')[0] == 'valve' else 'homeassistant.' ~ action_switch_on }}"
                target:
                  entity_id: "{{ current_valve }}"
              - delay: "{{ watervalve_close_delay }}"
              - if:
                  - condition: template
                    value_template: >
                      {{ set_soil_diag_enable and current_soil_valid and (soil_before | float) >= 0 }}
                then:
                  - event: my_greenhouse_soil_diag_check_event
                    event_data:
                      valve: "{{ current_valve }}"
                      sensor: "{{ current_soil_sensor }}"
                      soil_before: "{{ soil_before | float }}"
                      duration: "{{ time_work_current }}"

      #######################################################################################
      # Проверка насоса
      #######################################################################################

      check_pump: &check_pump
        sequence:
          - delay:
              seconds: 2
          - if:
              - condition: template
                value_template: |
                  {{ is_waterpump_defined and (states(waterpump_switch) in closed_states or states(waterpump_switch) in invalid_states) }}
            then:
              - variables:
                  log_message: |
                    Ошибка: насос не включился.
                    Текущее состояние: {{ states(waterpump_switch) }}
                  log_entity_id: !input waterpump_switch
                  notification_title: "Ошибка насоса"
              - *log_error
              - stop: "waterpump error"

      #######################################################################################
      # Проверка главного клапана
      #######################################################################################

      check_watering: &check_watering
        sequence:
          - delay:
              seconds: 2
          - if:
              - condition: template
                value_template: |
                  {{ states(watering_switch) in closed_states or states(watering_switch) in invalid_states }}
            then:
              - variables:
                  log_message: |
                    Ошибка: главный клапан не открылся.
                    Текущее состояние: {{ states(watering_switch) }}
                  log_entity_id: !input watering_switch
                  notification_title: "Ошибка клапана полива"
              - *log_error
              - *waterpump_off
              - stop: "watering error"

      #######################################################################################
      # Проверка погоды (и сенсора)
      #######################################################################################

      check_forecast: &check_forecast
        sequence:
          - if:
              - condition: template
                value_template: "{{ forecast_stale and use_forecast_enable }}"
            then:
              - variables:
                  log_message: >-
                    Предупреждение: прогноз погоды устарел или недоступен.
                    Сенсор: {{ forecast_sensor }}.
                    Данные прогноза игнорируются, полив продолжится по расписанию.
                  log_entity_id: "{{ forecast_sensor }}"
                  notification_title: "Прогноз погоды устарел"
              - *log_error
            else:
              - if:
                  - condition: template
                    value_template: |
                      {{ not no_rain_next_hours }}
                then:
                  - variables:
                      log_message: |
                        Внимание: полив отменен из-за прогноза погоды.
                      log_entity_id: !input forecast_sensor
                      notification_title: "Отмена полива"
                  - *log_error
                  - stop: "forecast delay"

      #######################################################################################
      # Закрытие НО клапанов
      #######################################################################################

      close_no_valve: &close_no_valve
        sequence:
          - if:
              - condition: template
                value_template: "{{ no_type_valve }}"
            then:
              - repeat:
                  for_each: !input watervalve_switch
                  sequence:
                    - action: >
                        {{ 'valve.' ~ action_valve_open if (repeat.item).split('.')[0] == 'valve' else 'homeassistant.' ~ action_switch_on }}
                      target:
                        entity_id: "{{ repeat.item }}"
                    - delay:
                        seconds: 1

      check_devices: &check_devices
        sequence:
          - variables:
              all_valves_unavailable: >
                {% set total = current_watervalve | list | length %}
                {% set unavail = current_watervalve | list
                    | select('in', unavailable_devices) | list | length %}
                {{ total > 0 and unavail == total }}

              critical_unavailable: >
                {{ states(watering_switch) in invalid_states
                  or (is_waterpump_defined and states(waterpump_switch) in invalid_states)
                  or all_valves_unavailable }}


          - if:
              - condition: template
                value_template: "{{ set_check_devices_enable }}"
            then:
              - if:
                  - condition: template
                    value_template: "{{ critical_unavailable }}"
                then:
                  - variables:
                      log_message: >-
                        Ошибка: полив заблокирован — критичные устройства недоступны.

                        Недоступные устройства:
                        {% for device in unavailable_devices %}
                        — {{ device }} ({{ states(device) }})
                        {% endfor %}

                        Возможные причины:
                        отсутствие интернета (облачные интеграции),
                        потеря связи с координатором Zigbee,
                        перезагрузка устройства.
                      log_entity_id: "{{ watering_switch }}"
                      notification_title: "Полив заблокирован"
                  - *log_error
                  - stop: "critical devices unavailable"
              - if:
                  - condition: template
                    value_template: >
                      {{ unavailable_devices and not critical_unavailable }}
                then:
                  - variables:
                      log_message: >-
                        Предупреждение: часть устройств недоступна,
                        но полив продолжится.

                        Недоступные устройства:
                        {% for device in unavailable_devices %}
                        — {{ device }} ({{ states(device) }})
                        {% endfor %}
                      log_entity_id: "{{ watering_switch }}"
                      notification_title: "Частичная недоступность устройств"
                  - *log_error


  - choose:

#######################################################################################
# Действие при аварийном отключении насоса (например, при протечке)
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - pump_off_trigger
          - condition: template
            value_template: |
              {{ trigger.from_state.state in open_states and trigger.to_state.state in closed_states }}

        sequence:
          - action: timer.finish
            target:
              entity_id: !input pump_off_auto

#######################################################################################
# Ручное выключение направления
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - watervalve_toggle_trigger
          - condition: template
            value_template: >
              {{ trigger.to_state.context.user_id is not none }}
          - condition: template
            value_template: >
              {{ trigger.to_state.state in closed_states and trigger.from_state.state in open_states }}

        sequence:
          - *close_watering

#######################################################################################
# Ручное включение направления
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - watervalve_toggle_trigger
          - condition: template
            value_template: >
              {{ trigger.to_state.context.user_id is not none }}
          - condition: template
            value_template: >
              {{ trigger.from_state.state in closed_states and trigger.to_state.state in open_states }}

        sequence:
#          - *check_devices
          - if:
              - condition: template # Проверка состояния реле насоса
                value_template: |
                  {{ is_waterpump_defined and states(waterpump_switch) in closed_states }}
            then:
              - *waterpump_on
              - *check_pump
              - delay: "{{ time_waterpump_work }}"
          - repeat:
              for_each: !input watervalve_switch # Закрытие всех клапанов направления (кроме выбранного)
              sequence:
                - if:
                    - condition: template
                      value_template: |
                        {{ repeat.item != trigger.from_state.entity_id }}
                  then:
                    - action: "{{ 'valve.' ~ action_valve_close if (repeat.item).split('.')[0] == 'valve' else 'homeassistant.' ~ action_switch_off }}"
                      target:
                        entity_id: "{{ repeat.item }}"
                    - delay:
                        seconds: 1
          - delay: "{{ watervalve_close_delay }}"
          - if:
              - condition: template # Проверка состояния клапана на полив
                value_template: |
                  {{ states(watering_switch) in closed_states }}
            then:
              - *open_watering
              - *check_watering

#######################################################################################
# Включение насоса до включения системы утром
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - time_before_morning_trigger
          - condition: template
            value_template: |
              {{ is_waterpump_defined and states(waterpump_switch) not in invalid_states }}
          - condition: template
            value_template: |
              {{ true if ('every_over_day_morning' not in set_working_day_morning) else ((now().timestamp() / 86400) | int % 2 == 0) }}
          - condition: template
            value_template: |
              {{ true if ('select_morning' not in set_working_day_morning) else selected_days_morning }}
          - condition: template
            value_template: |
              {{ watering_morning_enable }}

        sequence:
          - variables:
              current_watervalve: !input watervalve_switch
          - *check_devices

          - *check_forecast
          - *waterpump_on
          - *check_pump
          - *close_no_valve

#######################################################################################
# Закрытие клапанов направления до включения системы утром (без насоса)
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - time_before_morning_trigger
          - condition: template
            value_template: |
              {{ not is_waterpump_defined }}
          - condition: template
            value_template: |
              {{ true if ('every_over_day_morning' not in set_working_day_morning) else ((now().timestamp() / 86400) | int % 2 == 0) }}
          - condition: template
            value_template: |
              {{ true if ('select_morning' not in set_working_day_morning) else selected_days_morning }}
          - condition: template
            value_template: |
              {{ watering_morning_enable }}

        sequence:
          - variables:
              current_watervalve: |
                {% set morning_valves = morning_watervalve_switch 
                    | select('in', watervalve_switch) 
                    | list %}
                {{ (watervalve_switch if morning_valves == [] else morning_valves) | list }}              
          - *check_devices
          - *check_forecast
          - *close_no_valve

#######################################################################################
# Включение насоса до включения системы вечером
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - time_before_evening_trigger
          - condition: template
            value_template: |
              {{ is_waterpump_defined and states(waterpump_switch) not in invalid_states }}
          - condition: template
            value_template: |
              {{ true if ('every_over_day_evening' not in set_working_day_evening) else ((now().timestamp() / 86400) | int % 2 == 0) }}
          - condition: template
            value_template: |
              {{ true if ('select_evening' not in set_working_day_evening) else selected_days_evening }}
          - condition: template
            value_template: |
              {{ watering_evening_enable }}

        sequence:
          - variables:
              current_watervalve: |
                {% set evening_valves = evening_watervalve_switch 
                    | select('in', watervalve_switch) 
                    | list %}
                {{ (watervalve_switch if evening_valves == [] else evening_valves) | list }}              
          - *check_devices
          - *check_forecast
          - *waterpump_on
          - *check_pump
          - *close_no_valve

#######################################################################################
# Закрытие клапанов направления до включения системы вечером (без насоса)
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - time_before_evening_trigger
          - condition: template
            value_template: |
              {{ not is_waterpump_defined }}
          - condition: template
            value_template: |
              {{ true if ('every_over_day_evening' not in set_working_day_evening) else ((now().timestamp() / 86400) | int % 2 == 0) }}
          - condition: template
            value_template: |
              {{ true if ('select_evening' not in set_working_day_evening) else selected_days_evening }}
          - condition: template
            value_template: |
              {{ watering_evening_enable }}

        sequence:
          - variables:
              current_watervalve: |
                {% set evening_valves = evening_watervalve_switch 
                    | select('in', watervalve_switch) 
                    | list %}
                {{ (watervalve_switch if evening_valves == [] else evening_valves) | list }}              
          - *check_devices
          - *check_forecast
          - *close_no_valve

#######################################################################################
# Включение системы утром
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - on_morning_trigger
          - condition: template
            value_template: |
              {{ true if ('every_over_day_morning' not in set_working_day_morning) else ((now().timestamp() / 86400) | int % 2 == 0) }}
          - condition: template
            value_template: |
              {{ true if ('select_morning' not in set_working_day_morning) else selected_days_morning }}
          - condition: template
            value_template: |
              {{ not is_waterpump_defined or states(waterpump_switch) in open_states }}
          - condition: template
            value_template: |
              {{ watering_morning_enable }}
          - condition: template
            value_template: |
              {{ no_rain_next_hours }}
          - condition: template
            value_template: >
              {{ (weather_multiplier | float) > 0 }}

        sequence:
          - variables:
              time_work_current: "{{ adjusted_time_work_morning }}"
              current_watervalve: |
                {% set morning_valves = morning_watervalve_switch 
                    | select('in', watervalve_switch) 
                    | list %}
                {{ (watervalve_switch if morning_valves == [] else morning_valves) | list }}              
          - *check_devices
          - *open_watering
          - *check_watering
          - repeat:
              for_each: >
                {% set morning_valves = morning_watervalve_switch 
                    | select('in', watervalve_switch) 
                    | list %}
                {{ (watervalve_switch if morning_valves == [] else morning_valves) | list }}
              sequence:
                - *watervalve_action
          - *close_watering

#######################################################################################
# Включение системы вечером
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - on_evening_trigger
          - condition: template
            value_template: |
              {{ true if ('every_over_day_evening' not in set_working_day_evening) else ((now().timestamp() / 86400) | int % 2 == 0) }}
          - condition: template
            value_template: |
              {{ true if ('select_evening' not in set_working_day_evening) else selected_days_evening }}
          - condition: template
            value_template: |
              {{ not is_waterpump_defined or states(waterpump_switch) in open_states }}
          - condition: template
            value_template: |
              {{ watering_evening_enable }}
          - condition: template
            value_template: |
              {{ no_rain_next_hours }}
          - condition: template
            value_template: >
              {{ (weather_multiplier | float) > 0 }}

        sequence:
          - variables:
              time_work_current: "{{ adjusted_time_work_evening }}"
              current_watervalve: |
                {% set evening_valves = evening_watervalve_switch 
                    | select('in', watervalve_switch) 
                    | list %}
                {{ (watervalve_switch if evening_valves == [] else evening_valves) | list }}              
          - *check_devices
          - *open_watering
          - *check_watering
          - repeat:
              for_each: >
                {% set evening_valves = evening_watervalve_switch 
                    | select('in', watervalve_switch) 
                    | list %}
                {{ (watervalve_switch if evening_valves == [] else evening_valves) | list }}
              sequence:
                - *watervalve_action
          - *close_watering

#######################################################################################
# Выключение системы по таймеру
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - pump_off_auto_trigger

        sequence:
          - *close_watering
          - if:
              - condition: template
                value_template: |
                  {{ no_type_valve }}
            then:
              - repeat:
                  for_each: !input watervalve_switch
                  sequence:
                    - action: "{{ 'valve.' ~ action_valve_close if (repeat.item).split('.')[0] == 'valve' else 'homeassistant.' ~ action_switch_off }}"
                      target:
                        entity_id: "{{ repeat.item }}"
                    - delay:
                        seconds: 1
          - if:
              - condition: template 
                value_template: |
                  {{ person_not_in_home }}
              - condition: template
                value_template: |
                  {{ is_waterpump_defined and states(waterpump_switch) in open_states }}
            then:
              - delay: "{{ time_waterpump_work }}"
              - *waterpump_off

#######################################################################################
# Выключение таймера работы системы
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - watering_toggle_trigger
          - condition: template
            value_template: |
              {{ trigger.from_state.state in open_states and trigger.to_state.state in closed_states }}

        sequence:
          - action: timer.finish
            target:
              entity_id: !input pump_off_auto

#######################################################################################
# Включение таймера работы системы
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - watering_toggle_trigger
          - condition: template
            value_template: |
              {{ trigger.from_state.state in closed_states and trigger.to_state.state in open_states }}
          - condition: template
            value_template: |
              {{ not is_waterpump_defined or states(waterpump_switch) in open_states }}

        sequence:
          - action: timer.start
            data:
              duration: |
                {% set watervalve_count = watervalve_switch | list | count %}
                {% set work_time_morning_in_seconds = (adjusted_time_work_morning.split(':')[0] | int * 3600 + adjusted_time_work_morning.split(':')[1] | int * 60 + adjusted_time_work_morning.split(':')[2] | int) if watering_morning_enable else 0 %}
                {% set work_time_evening_in_seconds = (adjusted_time_work_evening.split(':')[0] | int * 3600 + adjusted_time_work_evening.split(':')[1] | int * 60 + adjusted_time_work_evening.split(':')[2] | int) if watering_evening_enable else 0 %}
                {% set soil_watering_duration_seconds = set_soil_watering_duration.split(':')[0] | int * 3600 + set_soil_watering_duration.split(':')[1] | int * 60 + set_soil_watering_duration.split(':')[2] | int %}
                {% set auto_off_pump_time_in_seconds = set_auto_off_pump_time.split(':')[0] | int * 3600 + set_auto_off_pump_time.split(':')[1] | int * 60 + set_auto_off_pump_time.split(':')[2] | int %}
                {% set max_seconds = max(
                  ((set_watervalve_open_delay | int + work_time_morning_in_seconds | int + set_watervalve_close_delay | int) * watervalve_count + 60),
                  ((set_watervalve_open_delay | int + work_time_evening_in_seconds | int + set_watervalve_close_delay | int) * watervalve_count + 60),
                  (set_watervalve_open_delay | int + soil_watering_duration_seconds + set_watervalve_close_delay | int + 60),
                  auto_off_pump_time_in_seconds) %}
                {{ '%02d:%02d:%02d' | format(max_seconds // 3600, (max_seconds % 3600) // 60, max_seconds % 60) }}
            target:
              entity_id: !input pump_off_auto

#######################################################################################
# Внеплановый полив по датчику влажности почвы (низкая влажность)
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - soil_moisture_low_trigger
          - condition: template
            value_template: |
              {{ set_use_soil_moisture and soil_watering_enable }}
          - condition: template
            value_template: |
              {{ states(watering_switch) in closed_states }}
          - condition: template
            value_template: |
              {{ states(pump_off_auto) == 'idle' }}
          - condition: template
            value_template: |
              {{ not is_night_time }}
        sequence:
          - variables:
              triggered_sensor: "{{ trigger.entity_id }}"

              triggered_valve: >
                {% set ns = namespace(idx=-1) %}
                {% for sensor in soil_moisture_sensors | list %}
                  {% if sensor == triggered_sensor and ns.idx == -1 %}
                    {% set ns.idx = loop.index0 %}
                  {% endif %}
                {% endfor %}
                {% if ns.idx >= 0 and (soil_moisture_valves | count) > ns.idx %}
                  {{ soil_moisture_valves[ns.idx] }}
                {% else %}
                  {{ '' }}
                {% endif %}

              time_work_current: "{{ set_soil_watering_duration }}"
              current_watervalve: "{{ triggered_valve }}"
          - *check_devices

          - if:
              - condition: template
                value_template: "{{ triggered_valve == '' }}"
            then:
              - variables:
                  log_message: >-
                    Ошибка: не найден клапан для датчика влажности {{ triggered_sensor }}.
                    Проверьте соответствие порядка списков "Клапаны направлений" и "Датчики влажности".
                  log_entity_id: "{{ triggered_sensor }}"
                  notification_title: "Ошибка сопоставления датчика"
              - *log_error
              - stop: "soil sensor mapping error"

          - *check_forecast

          - if:
              - condition: template
                value_template: |
                  {{ is_waterpump_defined and states(waterpump_switch) in closed_states }}
            then:
              - *waterpump_on
              - *check_pump
              - delay: "{{ time_waterpump_work }}"

          - *open_watering
          - *check_watering

          - variables:
              log_message: >-
                Внеплановый полив: направление {{ triggered_valve }} запущено
                из-за низкой влажности почвы ({{ states(triggered_sensor) }}%,
                порог {{ set_soil_watering_low_threshold }}%).
              log_entity_id: "{{ triggered_valve }}"
              notification_title: "Внеплановый полив"
          - *log_error

          - repeat:
              for_each: "{{ [triggered_valve] }}"
              sequence:
                - *watervalve_action

          - *close_watering

#######################################################################################
# Проверка на зависание датчика(-ов) влажности почвы
#######################################################################################

      - conditions:
          - condition: trigger
            id:
              - soil_diag_check_trigger

        sequence:
          - variables:
              diag_valve: "{{ trigger.event.data.valve | default('') }}"
              diag_sensor: "{{ trigger.event.data.sensor | default('') }}"
              soil_before: "{{ trigger.event.data.soil_before | float(default=-1) }}"
              diag_duration: "{{ trigger.event.data.duration | default('00:00:00') }}"
              diag_source: "{{ trigger.event.data.source | default('unknown') }}"

          - if:
              - condition: template
                value_template: >
                  {{
                    diag_sensor != ''
                    and (soil_before | float) >= 0
                    and states(diag_sensor) not in invalid_states
                  }}
            then:
              - delay: !input set_soil_diag_delay

              - variables:
                  soil_after: "{{ states(diag_sensor) | float(default=-1) }}"
                  soil_delta: "{{ ((soil_after | float) - (soil_before | float)) | round(1) }}"

              - if:
                  - condition: template
                    value_template: >
                      {{
                        (soil_after | float) >= 0
                        and (soil_delta | float) < (set_soil_diag_min_delta | float)
                      }}
                then:
                  - variables:
                      log_message: >-
                        Диагностика направления {{ diag_valve }}:
                        датчик {{ diag_sensor }} не показал ожидаемого роста влажности.

                        До полива: {{ soil_before }}%.
                        После полива: {{ soil_after }}%.
                        Изменение: {{ soil_delta }}%.
                        Минимально ожидаемое: {{ set_soil_diag_min_delta }}%.
                        Длительность полива: {{ diag_duration }}.
                        Источник: {{ diag_source }}.

                        Возможные причины:
                        неисправность датчика, засор линии,
                        вода не дошла до зоны датчика,
                        недостаточная длительность полива.
                      log_entity_id: "{{ diag_sensor }}"
                      notification_title: "Диагностика датчика влажности"
                  - *log_error

