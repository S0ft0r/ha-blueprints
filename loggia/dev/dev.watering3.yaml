blueprint:
  name: Управление оросительной системой
  description: |
    ### Управление оросительной системой лоджии.
    <small>Версия 2026.07.01 Сборка 1</small>

    <small><a href="https://github.com/S0ft0r/ha-blueprints/blob/main/as-is.md">Отказ от ответственности</a></small>
  domain: automation
  source_url: https://github.com/S0ft0r/ha-blueprints/blob/main/loggia/dev/dev.watering2.yaml
  author: Softor

  input:

    ####################################################################
    # Утро
    ####################################################################

    morning_section:
      name: Утренний полив
      icon: mdi:clock-time-four-outline
      input:
        morning_enabled:
          name: Включить утренний полив
          default: false
          selector:
            boolean: {}

        set_on_time_morning:
          name: Время включения
          default: "08:00:00"
          selector:
            time: {}

        set_time_work_morning:
          name: Длительность полива
          description: Время работы каждого направления
          default: 30
          selector:
            number:
              min: 1
              max: 600
              step: 1
              mode: box
              unit_of_measurement: "сек"

        morning_daily_valves:
          name: Направления для ежедневного полива утром
          description: |
            Эти направления будут поливаться каждый день утром.
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
              multiple: true

        morning_alternate_valves:
          name: Направления для полива через день утром
          description: |
            Эти направления будут поливаться через день утром.
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
              multiple: true

    ####################################################################
    # Вечер
    ####################################################################

    evening_section:
      name: Вечерний полив
      icon: mdi:clock-time-eight-outline
      input:
        evening_enabled:
          name: Включить вечерний полив
          default: false
          selector:
            boolean: {}

        set_on_time_evening:
          name: Время включения
          default: "20:00:00"
          selector:
            time: {}

        set_time_work_evening:
          name: Длительность полива
          description: Время работы каждого направления
          default: 30
          selector:
            number:
              min: 1
              max: 600
              step: 1
              mode: box
              unit_of_measurement: "сек"

        evening_daily_valves:
          name: Направления для ежедневного полива вечером
          description: |
            Эти направления будут поливаться каждый день вечером.
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
              multiple: true

        evening_alternate_valves:
          name: Направления для полива через день вечером
          description: |
            Эти направления будут поливаться через день вечером.
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
              multiple: true

    ####################################################################
    # Влажность почвы
    ####################################################################

    soil_section:
      name: Влажность почвы
      icon: mdi:flower-tulip-outline
      collapsed: true
      input:
        set_use_soil_moisture:
          name: Учитывать влажность почвы
          description: |
            Если включено, при плановом поливе направления
            с влажностью выше порога будут пропущены.
          default: false
          selector:
            boolean: {}

        soil_moisture_valves:
          name: Направления с датчиками влажности
          description: |
            Выберите направления, у которых есть датчик влажности.
            Порядок должен соответствовать списку датчиков ниже.
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - switch
              reorder: true
              multiple: true

        soil_moisture_sensors:
          name: Датчики влажности почвы
          description: |
            Выберите датчики влажности в том же порядке, что и направления выше.
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - sensor
                  device_class: moisture
              reorder: true
              multiple: true

        set_soil_skip_threshold:
          name: Не поливать, если влажность выше
          default: 65
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"

        soil_watering_enabled:
          name: Внеплановый полив при низкой влажности
          default: false
          selector:
            boolean: {}

        set_soil_moisture_min:
          name: Порог низкой влажности
          description: Ниже этого значения запускается внеплановый полив
          default: 30
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"

        set_time_work_soil:
          name: Длительность внепланового полива
          default: 15
          selector:
            number:
              min: 1
              max: 600
              step: 1
              mode: box
              unit_of_measurement: "сек"

        set_debounce_enabled:
          name: Защита от перелива
          default: false
          selector:
            boolean: {}

        set_debounce_time:
          name: Пауза между срабатываниями
          description: |
            Минимальная пауза между повторными включениями
            по датчику влажности.
          default: "00:10:00"
          selector:
            time: {}

trigger_variables:
  morning_daily_valves: !input morning_daily_valves
  morning_alternate_valves: !input morning_alternate_valves
  evening_daily_valves: !input evening_daily_valves
  evening_alternate_valves: !input evening_alternate_valves

  soil_moisture_valves: !input soil_moisture_valves
  soil_moisture_sensors: !input soil_moisture_sensors

  set_use_soil_moisture: !input set_use_soil_moisture
  soil_watering_enabled: !input soil_watering_enabled
  set_soil_moisture_min: !input set_soil_moisture_min
  set_soil_skip_threshold: !input set_soil_skip_threshold

  set_debounce_enabled: !input set_debounce_enabled
  set_debounce_time: !input set_debounce_time

  is_soil_defined: "{{ soil_moisture_valves != [] and soil_moisture_sensors != [] }}"

  invalid_states:
    - ""
    - "unavailable"
    - "unknown"
    - "none"

variables:
  is_alternate_day: "{{ (now().timestamp() / 86400) | int % 2 == 0 }}"

  current_valves_morning: >
    {% set daily = morning_daily_valves | list %}
    {% set alternate = morning_alternate_valves | list
        if is_alternate_day else [] %}
    {{ (daily + alternate) | unique | list }}

  current_valves_evening: >
    {% set daily = evening_daily_valves | list %}
    {% set alternate = evening_alternate_valves | list
        if is_alternate_day else [] %}
    {{ (daily + alternate) | unique | list }}

  debounce_seconds: >
    {{ set_debounce_time.split(':')[0] | int * 3600
     + set_debounce_time.split(':')[1] | int * 60
     + set_debounce_time.split(':')[2] | int }}

triggers:
  - trigger: time
    at: !input set_on_time_morning
    id: morning_trigger
    enabled: !input morning_enabled

  - trigger: time
    at: !input set_on_time_evening
    id: evening_trigger
    enabled: !input evening_enabled

  - trigger: numeric_state
    entity_id: !input soil_moisture_sensors
    below: !input set_soil_moisture_min
    id: soil_low_trigger
    enabled: "{{ is_soil_defined and soil_watering_enabled }}"

actions:
  - choose:

      #####################################################################
      # УТРЕННИЙ ПОЛИВ
      #####################################################################

      - conditions:
          - condition: trigger
            id:
              - morning_trigger
          - condition: template
            value_template: "{{ current_valves_morning | length > 0 }}"
        sequence:
          - variables:
              time_work_current: !input set_time_work_morning
          - repeat:
              for_each: "{{ current_valves_morning }}"
              sequence:
                - &water_valve
                  variables:
                    current_valve: "{{ repeat.item }}"

                    current_soil_sensor: >
                      {% set ns = namespace(idx=-1) %}
                      {% for valve in soil_moisture_valves | list %}
                        {% if valve == repeat.item and ns.idx == -1 %}
                          {% set ns.idx = loop.index0 %}
                        {% endif %}
                      {% endfor %}
                      {% if ns.idx >= 0 and (soil_moisture_sensors | count) > ns.idx %}
                        {{ soil_moisture_sensors[ns.idx] }}
                      {% else %}
                        {{ '' }}
                      {% endif %}

                    current_soil_valid: >
                      {{ current_soil_sensor != ''
                         and states(current_soil_sensor) not in invalid_states }}

                    current_soil_blocked: >
                      {{ set_use_soil_moisture
                         and current_soil_valid
                         and (states(current_soil_sensor) | float(-1)) >= (set_soil_skip_threshold | float) }}

                - if:
                    - condition: template
                      value_template: "{{ not current_soil_blocked }}"
                  then:
                    - action: homeassistant.turn_on
                      target:
                        entity_id: "{{ current_valve }}"
                    - delay:
                        seconds: "{{ time_work_current }}"
                    - action: homeassistant.turn_off
                      target:
                        entity_id: "{{ current_valve }}"

      #####################################################################
      # ВЕЧЕРНИЙ ПОЛИВ
      #####################################################################

      - conditions:
          - condition: trigger
            id:
              - evening_trigger
          - condition: template
            value_template: "{{ current_valves_evening | length > 0 }}"
        sequence:
          - variables:
              time_work_current: !input set_time_work_evening
          - repeat:
              for_each: "{{ current_valves_evening }}"
              sequence:
                - *water_valve
                - if:
                    - condition: template
                      value_template: "{{ not current_soil_blocked }}"
                  then:
                    - action: homeassistant.turn_on
                      target:
                        entity_id: "{{ current_valve }}"
                    - delay:
                        seconds: "{{ time_work_current }}"
                    - action: homeassistant.turn_off
                      target:
                        entity_id: "{{ current_valve }}"

      #####################################################################
      # ВНЕПЛАНОВЫЙ ПОЛИВ ПО ДАТЧИКУ ВЛАЖНОСТИ
      #####################################################################

      - conditions:
          - condition: trigger
            id:
              - soil_low_trigger
          - condition: template
            value_template: "{{ set_use_soil_moisture and soil_watering_enabled }}"
          - condition: template
            value_template: >
              {{ not set_debounce_enabled
                 or this.attributes.last_triggered is none
                 or (now() - this.attributes.last_triggered).total_seconds() > (debounce_seconds | int) }}
        sequence:
          - variables:
              triggered_sensor: "{{ trigger.entity_id }}"

              triggered_valve: >
                {% set ns = namespace(idx=-1) %}
                {% for sensor in soil_moisture_sensors | list %}
                  {% if sensor == triggered_sensor and ns.idx == -1 %}
                    {% set ns.idx = loop.index0 %}
                  {% endif %}
                {% endfor %}
                {% if ns.idx >= 0 and (soil_moisture_valves | count) > ns.idx %}
                  {{ soil_moisture_valves[ns.idx] }}
                {% else %}
                  {{ '' }}
                {% endif %}

          - if:
              - condition: template
                value_template: "{{ triggered_valve != '' }}"
            then:
              - action: homeassistant.turn_on
                target:
                  entity_id: "{{ triggered_valve }}"
              - delay:
                  seconds: !input set_time_work_soil
              - action: homeassistant.turn_off
                target:
                  entity_id: "{{ triggered_valve }}"

mode: single
