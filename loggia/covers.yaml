blueprint:
  name: Управление жалюзи
  description: |
    Управление жалюзи по времени или положению солнца. 
    
  domain: automation
  source_url: https://github.com/S0ft0r/ha-blueprints/blob/main/loggia/covers.yaml
  author: Softor

  input:
    blind:
      name: Жалюзи
      description: Какими жалюзи необходимо управлять?
      selector:
        entity:
          filter:
            - domain: 
              - cover
          reorder: false
          multiple: true

    automation_section:
      name: Настройки автоматизации
      icon: mdi:window-shutter-cog
      collapsed: false
      input:
        automation_options:
          name: Настройки управления жалюзи
          description: Выбор между открытием/закрытием жалюзи по времени и по рассвету/закату солнца.
          default:
            - options_sun
          selector:
            select:
              options:
                - label: Открытие/закрытие по времени
                  value: options_time
                - label: Открытие/закрытие по солнцу
                  value: options_sun
              multiple: false
              sort: false
              custom_value: false

        automation_extra:
          name: Дополнительные настройки
          description: Дополнительные настройки автоматизации
          default: []
          selector:
            select:
              options:
                - label: Задержка открытия до срабатывания будильника
                  value: extra_alarm_pause
                # - label: Ограничение закрытия жалюзи %
                #   value: extra_limit_down
                - label: Защита от прямых лучей солнца
                  value: extra_sun_protect
                - label: Учитывать погодный прогноз 
                  value: extra_forecast
              sort: false
              multiple: true
              custom_value: false
              mode: list

        forecast_sensor:
          name: Прогнозный сенсор
          description: >-
            Сенсор, определяющий прогноз погоды
          default: []
          selector:
            entity:
              filter:
                - domain: 
                  - weather
              multiple: false

    time_section:
      name: "Настройки управления по времени"
      icon: mdi:clock-time-eight-outline
      input:
        set_up_time:
          name: Открыть жалюзи в
          default: "08:00:00"
          selector:
            time: {}
        set_down_time:
          name: Закрыть жалюзи в
          default: "20:00:00"
          selector:
            time: {}


    sun_section:
      name: "Настройки управления по солнцу"
      icon: mdi:weather-sunny
      input:
        sun_sensor:
          name: "Датчик солнца"
          description: >-
            Датчик, по которому определяется положение солнца
          default: "sun.sun"
          selector:
            entity:
              filter:
                - domain:
                    - sun
              multiple: false

        sun_azimut:
          name: Азимут солнца
          description: >-
            Угол между направлением на север и направлением на солнце. Для автоматического закрытия жалюзи при включенной опции защиты от прямых лучей солнца.
          default: 0
          selector:
            number:
              min: 0
              max: 359
              step: 1
              unit_of_measurement: '°'
              mode: slider

        sun_elevation:
          name: Высота солнца
          description: >-
            Угол возвышения солнца на горизонтом. Для автоматического открытия жалюзи при включенной защите от прямых лучей солнца
          default: 0
          selector:
            number:
              min: 0
              max: 45
              step: 1
              unit_of_measurement: '°'
              mode: slider
        blind_for_protect:
          name: Жалюзи
          description: |
            Какими жалюзи необходимо управлять для защиты от прямых лучей солнца?
            * Параметр не обязателен.
              Если ничего не выбрано, то используются все жалюзи
          default: []
          selector:
            entity:
              filter:
                - domain: 
                  - cover
              reorder: false
              multiple: true

    options_section:
      name: "Дополнительные настройки"
      icon: mdi:cog
      input:
        up_limit:
          name: Верхний предел
          description: "Верхний предел при открытии жалюзи - если нет нужды открывать жалюзи до конца."
          default: 99
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        down_limit:
          name: Нижний предел
          description: "Нижний предел при закрытии жалюзи - если нет нужды закрывать жалюзи до конца."
          default: 0
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        do_not_blind_open_until_sensor:
          name: Не поднимать до
          description: >-
            Датчик, определяющий время срабатывания будильника
          default: []
          selector: 
            entity:
              filter:
                - domain: sensor
                  device_class: timestamp
              multiple: false

        alarm_delay:
          name: Задержка открытия
          description: "Задержка открытия жалюзи после срабатывание будильника"
          default: "00:10:00"
          selector:
            time: {}

        forecasts:
          name: Прогноз погоды
          description: >-
            Прогноз погоды, при котором срабатывает защита от попадания прямых лучей 
          default: 
            - forecast_sunny
            - forecast_partlycloudy
          selector:
            select:
              options:
                - label: Ясно
                  value: forecast_sunny
                - label: Переменная облачность
                  value: forecast_partlycloudy
                - label: Облачно
                  value: forecast_cloudy
                - label: Туман
                  value: forecast_fog
              sort: false
              multiple: true
              custom_value: false
              mode: list


trigger_variables:
  automation_options: !input automation_options
  automation_extra:   !input automation_extra

  forecast_sensor:                !input forecast_sensor
  blind_for_protect:              !input blind_for_protect
  sun_sensor:                     !input sun_sensor
  do_not_blind_open_until_sensor: !input do_not_blind_open_until_sensor

  forecasts:          !input forecasts
  alarm_delay:        !input alarm_delay
  sun_azimut:         !input sun_azimut
  sun_elevation:      !input sun_elevation

  blind_protected: >-   
    {% if blind_for_protect == [] %}
      {{ blind_for_protect }} 
    {% else %}
      {{ blind }}
    {% endif %}"
  
  is_automation_time_enabled:  "{{ 'options_time' in automation_options }}"
  is_automation_sun_enabled:   "{{ 'options_sun'  in automation_options }}"

  is_forecast_enabled:         "{{ forecast_sensor != [] and 'extra_forecast' in automation_extra }}"
  is_sun_protect_enabled:      "{{ (sun_azimut != 0 or sun_elevation != 0) and 'extra_sun_protect' in automation_extra }}"
  is_open_until_enabled:       "{{ do_not_blind_open_until_sensor != [] and 'extra_alarm_pause' in automation_extra }}"

triggers:
  - trigger:        time
    at:             !input set_up_time
    id:             up_time_trigger
    enabled:        "{{ is_automation_time_enabled }}"

  - trigger:        time
    at:             !input set_down_time
    id:             down_time_trigger
    enabled:        "{{ is_automation_time_enabled }}"

  - trigger:        sun
    event:          sunrise
    id:             sunrise_trigger
    enabled:        "{{ is_automation_sun_enabled }}"

  - trigger:        sun
    event:          sunset
    id:             sunset_trigger
    enabled:        "{{ is_automation_sun_enabled }}"

  - trigger:        state
    entity_id:      !input forecast_sensor
    id:             forecast_trigger
    enabled:        "{{ is_forecast_enabled }}"

  - trigger:        template
    value_template: "{{ state_attr(sun_sensor,'azimuth') | float > sun_azimut }}"
    id:             sun_azimut_trigger
    enabled:        "{{ is_sun_protect_enabled }}"

  - trigger:        template
    value_template: "{{ state_attr(sun_sensor,'elevation') | float > sun_elevation }}"
    id:             sun_elevation_trigger
    enabled:        "{{ is_sun_protect_enabled }}"


actions:
  - choose:
      - conditions: # Время открытия
          - condition: trigger
            id:
              - up_time_trigger
        sequence:
          - action: cover.set_cover_position
            metadata: {}
            target:
              entity_id: !input blind
            data:
              position: 99

      - conditions: # Солнце взошло
          - condition: trigger
            id:
              - sunrise_trigger
        sequence:
          - if:
            - condition: template
              value_template: "{{ is_open_until_enabled }}"
            then:
              - wait_template: >-
                  {% set h = alarm_delay.split(':')[0] | int %}
                  {% set m = alarm_delay.split(':')[1] | int %}
                  {% set s = alarm_delay.split(':')[2] | int %}
                  {{ now() >= states(do_not_blinds_open_until_sensor) | as_datetime |
                    as_local + timedelta(hours=h, minutes=m, seconds=s) }}
          - action: cover.set_cover_position
            metadata: {}
            target:
              entity_id: !input blind
            data:
              position: !input up_limit

      - conditions: # Время закрытия
          - condition: trigger
            id:
              - down_time_trigger
        sequence:
          - action: cover.set_cover_position
            metadata: {}
            target:
              entity_id: !input blind
            data:
              position: !input down_limit

      - conditions: # Солнце село
          - condition: trigger
            id:
              - sunset_trigger
        sequence:
          - action: cover.set_cover_position
            metadata: {}
            target:
              entity_id: !input blind
            data:
              position: !input down_limit

      - conditions: # Открыть жалюзи при защите от прямых лучей солнца
          - condition: trigger
            id:
              - sun_elevation_trigger
        sequence:
          - action: cover.set_cover_position
            metadata: {}
            target:
              entity_id: blind_protected
            data:
              position: !input up_limit

      - conditions: # Закрыть жалюзи при защите от прямых лучей солнца
          - condition: trigger
            id:
              - sun_azimut_trigger
          - condition: template
            value_template: "{{ state_attr(sun_sensor,'elevation') | float > sun_elevation }}"
        sequence:
          - action: cover.set_cover_position
            metadata: {}
            target:
              entity_id: blind_protected
            data:
              position: !input down_limit

mode: single
