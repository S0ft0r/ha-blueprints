blueprint:
  name: Управление жалюзи
  description: Управление жалюзи по времени, солнцу, слайдеру
  domain: automation
  source_url: https://github.com/S0ft0r/ha-blueprints/blob/main/loggia/covers.yaml
  author: Softor
  input:
    blind:
      name: Жалюзи
      description: Какими жалюзи необходимо управлять?
      selector:
        entity:
          filter:
          - domain:
            - cover
          reorder: false
          multiple: false
    oprions:
      name: Настройки автоматизации
      icon: mdi:window-shutter-cog
      collapsed: false
      input:
        feature:
          name: Настройки управления жалюзи
          description: Какое-то объяснение
          default:
          - feature_sun_enabled
          selector:
            select:
              options:
              - label: Открытие/закрытие по времени
                value: feature_time_enabled
              - label: Открытие/закрытие по солнцу
                value: feature_sun_enabled
              multiple: true
              sort: false
              custom_value: false
              mode: list
        extra:
          name: Дополнительные настройки
          description: Какое-то объяснение для дополнительных настроек
          default: []
          selector:
            select:
              options:
              - label: Задержка открытия до срабатывания будильника
                value: extra_sun_pause_enabled
              - label: Ограничение закрытия жалюзи %
                value: extra_limit_down
              - label: Защита от прямых лучей солнца
                value: extra_sun_protect
              - label: Учитывать погодный прогноз 
                value: extra_limit_down
              sort: false
              multiple: true
              custom_value: false
              mode: list
    time_section:
      name: "Настройки управления по времени"
      icon: mdi:clock-time-eight-outline
      input:
        set_up_time:
          name: Время открытия жалюзи
          default: ""
          selector:
            time: {}
        set_down_time:
          name: Время Закрытия жалюзи
          default: ""
          selector:
            time: {}
        down_limit:
          name: Нижний предел 
          description: "Нижний предел при закрытии жалюзи - если нет нужды закрывать жалюзи до конца."
          default: 0
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: '%'
              mode: slider
    sun_section:
      name: "Настройки управления по солнцу"
      icon: mdi:weather-sunny
      input:
        default_sun_sensor:
          name: "Датчик солнца"
          description: >-
            Что-то
          default: "sun.sun"
          selector:
            entity:
              filter:
                - domain:
                    - sun
        sun_azimut:
          name: Азимут солнца
          description: >-
            Угол между направлением на север и направлением на солнце. Для автоматического закрытия жалюзи при включенной опции защиты от прямых лучей солнца.
          default: 0
          selector:
            number:
              min: 0
              max: 359
              step: 1
              unit_of_measurement: '°'
              mode: slider
        sun_elevation:
          name: Высота солнца
          description: >-
            Угол возвышения солнца на горизонтом. Для автоматического открытия жалюзи при включенной защите от прямых лучей солнца
          default: 0
          selector:
            number:
              min: 0
              max: 45
              step: 1
              unit_of_measurement: '°'
              mode: slider
    options_section:
      name: "Дополнительные настройки"
      icon: mdi:cog
      input:
        alarm_sensor:
          name: Не поднимать до
          description: >-
            Датчик, определяющий время срабатывания будильника
          selector:
            entity:
              filter:
              - domain: sensor
                device_class: timestamp
              multiple: false
        alarm_time:
          name: Задержка открытия
          description: "Задержка открытия жалюзи после срабатывание будильника"
          default: "00:10:00"
          selector:
            time: {}
        forecast_sensor:
          name: Прогнозный сенсор
          description: >-
            Сенсор, определяющий прогноз погоды
          selector:
            entity:
              filter:
              - domain: weather
              multiple: false
    # forecast:
    #   name: "Погода"
    #   description: "Прогноз погоды, при котором управляются жалюзи"
    #   input:
        forecasts:
          name: Прогноз погоды
          description: >-
            Прогноз погоды, при котором срабатывает защита от попадания прямых лучей 
          default: 
            - forecast_sunny
            - forecast_partlycloudy
          selector:
            select:
              options:
              - label: Ясно
                value: forecast_sunny
              - label: Переменная облачность
                value: forecast_partlycloudy
              - label: Облачно
                value: forecast_cloudy
              - label: Туман
                value: forecast_fog
              sort: false
              multiple: true
              custom_value: false
              mode: list


trigger_variables:
  is_feature_time_enabled: >-
    {{ 'feature_time_enabled' in feature }}
  is_feature_sun_enabled: >-
    {{ 'feature_sun_enabled' in feature }}

  set_up_time: !input set_up_time
  set_down_time: !input set_down_time


variables: 
  current_sun_azimuth: "{{ state_attr(default_sun_sensor, 'azimuth') }}"
  current_sun_elevation: "{{ state_attr(default_sun_sensor, 'elevation') }}"

         

triggers:
  - trigger: template
    value_template: >-
      {{ now() == set_up_time | as_datetime | as_local }}
    enabled: >-
      {{ is_feature_time_enabled }}
    id: "time_up"

  - trigger: template
    value_template: >-
      {{ now() == set_down_time | as_datetime | as_local }}
    enabled: >-
      {{ is_feature_time_enabled }}
    id: "time_down"


action:
  service: light.turn_on
  target: light.light
          
mode: parallel
max_exceeded: silent